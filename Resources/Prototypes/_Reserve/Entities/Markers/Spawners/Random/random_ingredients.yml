# region Condiment Bottles

- type: entity
  parent: MarkerBase
  id: RandomFoodCondimentBottle
  name: random ingredient spawner
  description: Spawns a random condiment bottle.
  suffix: condiment bottle
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - DrinkBottleTall
    # Condiments
    - FoodCondimentBottleKetchup
    - FoodCondimentBottleBBQ
    - FoodCondimentBottleHotsauce
    - FoodCondimentBottleKetchunaise
    - FoodCondimentBottleMayo
    - FoodCondimentBottleMustard
    - FoodCondimentBottleSoySauce
    # Ingredients
    - FoodCondimentBottleEnzyme
    - FoodCondimentBottleVinegar
    - FoodCondimentBottleVinaigrette
    - FoodCondimentBottleHorseradishSauce
    - FoodCondimentBottleSyrup
    - FoodCondimentBottleBlackpepper
    - FoodCondimentBottleTonic
    - FoodCondimentBottleGrenadine
    - FoodCondimentBottleTeaPowder
    - FoodCondimentBottleAllicin
    # Oils
    - FoodCondimentBottleOil
    - FoodCondimentBottleOliveOil
    - FoodCondimentBottleCapsaicinOil
    - FoodCondimentBottleFrostOil
    - FoodCondimentBottleCornOil
    - FoodCondimentBottleRefinedOil
    chance: 0.8
    rarePrototypes:
    # Mixes
    - FoodCondimentBottleExoticBitter
    - FoodCondimentBottleTeriyaki
    - FoodCondimentBottleVodkaSauce
    - FoodCondimentBottleEveryspice
    # Special condiments
    - FoodCondimentBottleAstrotame
    - FoodCondimentBottleLaughinSyrup
    - FoodCondimentBottleColdsauce
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: Objects/Consumable/Food/condiments.rsi
    state: bottle-empty

# endregion

