- type: entity
  id: RandomValuable
  name: random valuable spawner
  suffix: Gold, diamond, credits, research
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
      - state: green
      - sprite: Objects/Consumable/Drinks/dr_gibb.rsi
        state: icon
  - type: RandomSpawner
    prototypes:
      - IngotGold1
      - IngotGold1
      - IngotGold1
      - MaterialDiamond1
      - ResearchDisk
      - ResearchDisk
      - ResearchDisk5000
      - ResearchDisk5000
      - SpaceCash10
      - SpaceCash100
      - SpaceCash500
      - SpaceCash1000
    chance: 0.8
    offset: 0.0
    rarePrototypes:
      - IngotGold
      - MaterialDiamond
      - ResearchDisk10000
      - SpaceCash2500
    rareChance: 0.05

