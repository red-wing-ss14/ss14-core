- type: entity
  id: RandomBotanistTool
  name: random tool
  suffix: Botanist, Hydroponics
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
      - state: green
      - sprite: _Reserve/Objects/Specific/Hydroponics/plant_analyzer.rsi
        state: icon
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: BotanistToolTable

- type: entity
