- type: entity
  id: RandomGlasses
  name: random clothing spawner
  suffix: Glasses, Goggles
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
      - state: green
      - sprite: Clothing/Eyes/Glasses/sunglasses.rsi
        state: icon
  - type: RandomSpawner
    prototypes:
      - ClothingEyesGlassesCheapSunglasses
      - ClothingEyesGlassesCheapSunglasses
      - ClothingEyesGlassesCheapSunglasses
      - ClothingEyesGlassesSunglasses
      - ClothingEyesGlassesSunglasses
      - ClothingEyesGlasses
      - ClothingEyesGlassesJamjar
      - ClothingEyesGlassesJensen
      - ClothingEyesGlassesOutlawGlasses
    chance: 0.8
    offset: 0.0
    rarePrototypes:
      - ClothingEyesGlassesNoir
      - ClothingEyesGlassesMercenary
      - ClothingEyesHudOnionBeer
    rareChance: 0.05

