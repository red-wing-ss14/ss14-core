- type: entity
  name: weldbot spawner
  parent: MarkerBase
  id: SpawnMobWeldbot
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: _EinsteinEngines/Mobs/Silicon/Bots/weldbot.rsi
      state: weldbot
  - type: ConditionalSpawner
    prototypes:
    - MobWeldbot

