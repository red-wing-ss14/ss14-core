    layers:
    - state: green
    - sprite: Mobs/Silicon/Bots/mimebot.rsi
      state: mimebot
  - type: ConditionalSpawner
    prototypes:
    - MobHonkBot
    - MobJonkBot
    - MobMimeBot

- type: entity
  parent: MarkerBase
  id: SpawnMobAnyBot
  name: any minibot spawner
