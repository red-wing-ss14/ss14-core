# region Sauces

- type: entity
  parent: BaseFoodCondimentPacket
  id: FoodCondimentPacketHotKetchup
  name: hot ketchup packet
  description: Contains 10u of hot ketchup.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Ketchup
          Quantity: 5
        - ReagentId: Hotsauce
          Quantity: 5
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: packet-solid-

