# region Empty

- type: entity
  parent: DrinkCanBaseFull
  id: DrinkCan
  name: aluminium can
  suffix: ""
  description: Buy this if you hate the environment.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
      grindable: &grindableAluminium
        reagents:
        - ReagentId: Aluminium
          Quantity: 4
        - ReagentId: Iron
          Quantity: 1
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Drinks/cans.rsi
  - type: Item
    sprite: _Reserve/Objects/Consumable/Drinks/cans.rsi

# endregion

