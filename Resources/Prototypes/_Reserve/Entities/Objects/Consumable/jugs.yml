- type: entity
  parent: [DrinkBottleVisualsOpenable, DrinkBottlePlasticBaseFull]
  id: DrinkAppleJuiceJug
  name: apple juice jug
  description: Just apples.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 300
        reagents:
        - ReagentId: JuiceApple
          Quantity: 300
  - type: Edible
  - type: Label
    currentLabel: reagent-name-juice-apple

