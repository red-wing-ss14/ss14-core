# region Apple

- type: entity
  parent: FoodPineappleSlice
  id: FoodAppleSlice
  name: apple slice
  components:
  - type: FlavorProfile
    flavors:
      - apple
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Food/slices.rsi
    state: apple
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: JuiceApple
        Quantity: 2.5
  - type: FoodSequenceElement
    entries:
      Burger: AppleSliceBurger
      Taco: AppleSlice
      Skewer: AppleSlice

- type: entity
  parent: FoodAppleSlice
  id: FoodGoldenAppleSlice
  name: golden apple slice
  components:
  - type: FlavorProfile
    flavors:
      - apple
      - metallic
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Food/slices.rsi
    state: golden_apple
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: JuiceApple
        Quantity: 2.5
      - ReagentId: Gold
        Quantity: 2.5
  - type: FoodSequenceElement
    entries:
      Burger: GoldenAppleSliceBurger
      Taco: GoldenAppleSlice
      Skewer: GoldenAppleSlice

# endregion

