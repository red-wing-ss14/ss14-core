# region Empty

- type: entity
  parent: DrinkBaseCup
  id: DrinkCup
  name: cup
  description: A dark sturdy cup.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 20
  - type: Icon
    sprite: _Reserve/Objects/Consumable/Drinks/cups.rsi
    state: icon-vend
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Drinks/cups.rsi
    layers:
      - state: icon-0
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: icon-4
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: icon-
  - type: TrashOnSolutionEmpty
    solution: drink

# endregion

