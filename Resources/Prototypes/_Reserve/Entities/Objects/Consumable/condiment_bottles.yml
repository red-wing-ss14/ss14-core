# region Empty

- type: entity
  parent: BaseFoodCondimentBottle
  id: DrinkBottleTall
  name: condiment bottle
  description: Perfect for cooking.
  suffix: condiment bottle
  components:
  - type: Sprite
    layers:
    - state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - state: label-c
    - state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Icon
    state: bottle-coldsauce

# endregion

