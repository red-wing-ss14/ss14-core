# region Empty

- type: entity
  parent: [DrinkBottleVisualsOpenable, DrinkBottleGlassBaseFull]
  id: DrinkBottle
  name: bottle
  description: Hopefully no microplastics inside.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 100
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Drinks/Bottles/default.rsi
    layers:
      - state: icon
        map: ["enum.OpenableVisuals.Layer"]
      - state: fill-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: fill-

# region Juices

- type: entity
  parent: DrinkBottle
  id: DrinkJuicePumpkinBottleFull
  name: Pumpkin Paradise bottle
  description: A bottle of non-sweetened blended pumpkin flesh.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: PumpkinFlesh
          Quantity: 100
  - type: Label
    currentLabel: reagent-name-pumpkin-flesh
  - type: Sprite
    sprite: _Reserve/Objects/Consumable/Drinks/Bottles/pumpkin.rsi

