- type: species
  id: Resomi
  name: species-name-resomi
  roundStart: true
  prototype: MobResomi
# Amour port: WD Slim body types START
  bodyTypes:
  - ResomiNormal
# Amour port: WD Slim body types START
  defaultSkinTone: "#faf7f7"
  markingLimits: MobResomiMarkingLimits
  dollPrototype: MobResomiDummy
  skinColoration: Hues
  maleFirstNames: NamesResomiMale
  femaleFirstNames: NamesResomiFemale
  naming: First
  sexes: # Goobstation - why bother having male/female names and soundCollections if they were only available unsexed?
  - Unsexed
  - Male
  - Female
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Resomi.xml"
  pros:
  - species-resomi-pro-cold-immunity
  special:
  - species-resomi-special-fit-in-duffel
  cons:
  - species-resomi-con-heat-vulnerable
  - species-resomi-con-blunt-vulnerable
  - species-resomi-con-heat-sensitivity
  - species-resomi-con-weak-pull
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  # resomi sprites look very wrong when too big or too wide
  minHeight: 0.80
  defaultHeight: 0.90
  maxHeight: 1
  minWidth: 0.85
  defaultWidth: 1
  maxWidth: 1
  # end Goobstation: port EE height/width sliders

# Amour port: WD Slim body types START
- type: bodyType
  id: ResomiNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobResomiHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    Chest: MobResomiChest
    Groin: MobResomiGroin
    Eyes: MobResomiEyes
    LArm: MobResomiLArm
    RArm: MobResomiRArm
    LHand: MobResomiLHand
    RHand: MobResomiRHand
    LLeg: MobResomiLLeg
    RLeg: MobResomiRLeg
    LFoot: MobResomiLFoot
    RFoot: MobResomiRFoot
    Tail: MobHumanoidAnyMarking
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking

- type: markingPoints
  id: MobResomiMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 2
      required: true
      defaultMarkings: [ ResomiTail, ResomiTailFeathers ]
    HeadTop:
      points: 8
      required: false
    HeadSide:
      points: 8
      required: false
    Chest:
      points: 10
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false

