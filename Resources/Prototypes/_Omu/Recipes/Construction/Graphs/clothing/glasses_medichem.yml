- type: constructionGraph
  id: GlassesMedChemHUD
  start: start
  graph:
    - node: start
      edges:
        - to: glassesMedChem
          steps:
            - tag: Sunglasses
              name: construction-graph-tag-sun-glasses
              icon:
                sprite: Clothing/Eyes/Glasses/sunglasses.rsi
                state: icon
              doAfter: 5
            - tag: HudMedichem
              name: construction-graph-tag-medichem-hud
              icon:
                sprite: _Omu/Clothing/Eyes/Glasses/medichem.rsi
                state: icon
              doAfter: 5
            - material: Cable
              amount: 5
              doAfter: 5

    - node: glassesMedChem
      entity: ClothingEyesGlassesMedChemFlash
      edges:
      - to: start
        steps:
        - tool: Screwing
          doAfter: 5
        completed:
        - !type:SpawnPrototype
          prototype: ClothingEyesGlassesSunglasses
        - !type:SpawnPrototype
          prototype: ClothingEyesGlassesMedChem
        - !type:DeleteEntity
