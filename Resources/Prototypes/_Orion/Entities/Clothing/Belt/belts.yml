- type: entity
  parent: [ BaseMinorContraband, ClothingBeltStorageBase ]
  id: ClothingBeltInteQWebbing
  name: combat webbing
  description: Unique and versatile chest mount in which you can store weapons and ammunition.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/inteq_webbing.rsi
  - type: Clothing
    sprite: _Orion/Clothing/Belt/inteq_webbing.rsi

- type: entity
  parent: [ BaseMinorContraband, ClothingBeltStorageBase ]
  id: ClothingBeltInteQDropPouch
  name: combat drop pouch
  description: Improved unloading for storing various items
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/inteq_droppouch.rsi
  - type: Clothing
    sprite: _Orion/Clothing/Belt/inteq_droppouch.rsi

- type: entity
  parent: [ BaseMajorContraband, ClothingBeltBase ]
  id: ClothingBeltInteQShieldBelt
  name: InteQ shield belt
  description: Brilliant ideas came before the bullet, and the mercenaries came up with the idea of using shields not only in hardsuits.
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _Orion/Clothing/Belt/inteq_shieldbelt.rsi
  - type: Clothing
    sprite: _Orion/Clothing/Belt/inteq_shieldbelt.rsi
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
  - type: EnergyDomeGenerator
    damageEnergyDraw: 8
    domePrototype: EnergyDomeSmallOrange
  - type: PowerCellDraw
    drawRate: 0
    useCharge: 0
  - type: UseDelay
    delay: 10.0
  - type: ScannableForPoints # Goob
    points: 1

- type: entity
  parent: ClothingBeltSheath
  id: ClothingBeltWhiteSheath
  name: white sabre sheath
  description: Style, shine, everything for the best sabers in the universe.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/white_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Orion/Clothing/Belt/white_sheath.rsi

- type: entity
  parent: ClothingBeltSheath
  id: ClothingBeltSheriffSheath
  name: sheriff sabre sheath
  description: Practicality, durability, the saber will definitely not end up in your leg.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/sheriff_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Orion/Clothing/Belt/sheriff_sheath.rsi

- type: entity
  parent: ClothingBeltSheath
  id: ClothingBeltCentCommSheath
  name: centcomm sabre sheath
  description: 545 corpses, zero lawsuits, janitors are quitting, crematorium is overheating. CentCom nods in approval.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/centcomm_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Orion/Clothing/Belt/centcomm_sheath.rsi

- type: entity
  parent: ClothingBeltSheath
  id: ClothingBeltKatanaSheath
  name: katana sheaths
  description: An ornate belt designed to hold a pair of samurai's blades, or daisho.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Belt/katanasheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Orion/Clothing/Belt/katanasheath.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      item: !type:ContainerSlot {}
      item2: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      item:
        name: Katana
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Katana
      item2:
        name: Wakizashi
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Wakizashi
  - type: ItemMapper
    mapLayers:
      sheath-katana:
        whitelist:
          tags:
          - Katana
      sheath-wakizashi:
        whitelist:
          tags:
          - Wakizashi
  - type: Appearance
