- type: entity
  parent: ChemDispenser
  id: MiniChemDispenser
  suffix: Filled
  name: mini chemical dispenser
  components:
  - type: Sprite
    sprite: _Orion/Structures/Dispensers/mini_dispensers.rsi
    state: industrial-off
  - type: ItemMapper
    sprite: _Orion/Structures/Dispensers/mini_dispensers.rsi
    containerWhitelist: [beakerSlot]
    mapLayers:
      industrial_loaded:
        whitelist:
          components:
          - FitsInDispenser

- type: entity
  parent: MiniChemDispenser
  id: MiniChemDispenserEmpty
  suffix: Empty
  name: mini chemical dispenser

- type: entity
  parent: EnergyChemDispenser
  id: EnergyMiniChemDispenser
  suffix: Energy
  name: mini chemical dispenser
  components:
  - type: Sprite
    sprite: _Orion/Structures/Dispensers/mini_dispensers.rsi
    state: industrial-off
  - type: ItemMapper
    sprite: _Orion/Structures/Dispensers/mini_dispensers.rsi
  - type: Battery
    netsync: false
    maxCharge: 500
    startingCharge: 500
