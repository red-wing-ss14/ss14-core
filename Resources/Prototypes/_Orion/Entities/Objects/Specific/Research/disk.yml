- type: entity
  parent: BaseItem
  id: ResearchDataDisk
  name: research data disk
  description: Stores a fixed snapshot of researched technologies from a specific R server.
  components:
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/disk_pickup.ogg
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/disk_drop.ogg
      params:
        volume: -6
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/disk_drop.ogg
      params:
        volume: -6
  - type: Sprite
    sprite: _Orion/Objects/Specific/Research/data_disk.rsi
    state: icon
  - type: ResearchDataDisk
  - type: GuideHelp
    guides:
    - OrionRnDMachines