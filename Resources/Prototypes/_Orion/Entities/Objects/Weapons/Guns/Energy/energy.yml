- type: entity
  parent: [BaseWeaponBattery, BaseSecurityContraband]
  id: WeaponEarthGovLaserRifle
  name: EarthGov laser rifle
  description: An Earth Government standard issue laser rifle, used by army and police.
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/Battery/EG-R/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-2
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Orion/Objects/Weapons/Guns/Battery/EG-R/tiny.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Guns/Battery/EG-R/tiny.rsi
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -44
  - type: Gun
    minAngle: 24
    maxAngle: 45
    cameraRecoilScalar: 0.5
    fireRate: 2.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/EG-R/shot.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: true
  - type: Battery
    maxCharge: 5000 # Amour edit: 2000 > 5000
    startingCharge: 5000 # Amour edit: 2000 > 5000
  - type: BatteryAmmoProvider
    proto: RedMediumLaser
    fireCost: 100 # Amour edit: 40 > 100
  - type: Wieldable

