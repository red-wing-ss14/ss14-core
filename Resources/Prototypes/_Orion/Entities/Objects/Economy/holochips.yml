- type: entity
  parent: BaseItem
  id: CreditHolochip
  name: credit holochip
  description: A holographic credit carrier.
  components:
  - type: Cash
  - type: CreditHolochip
  - type: Stack
    stackType: CreditHolochip
    count: 1
    baseLayer: base
    layerStates:
    - holochip-color
    - holochip_kilo-color
    - holochip_mega-color
    - holochip_giga-color
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [1000, 1000000, 1000000000]
  - type: Sprite
    sprite: _Orion/Objects/Economy/holochip.rsi
    state: holochip
    layers:
    - state: holochip-color
      map: ["base"]
    - state: holochip
      map: ["overlay"]
  - type: Appearance
  - type: StaticPrice
    price: 0

