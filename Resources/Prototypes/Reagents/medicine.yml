- type: reagent
  id: Bicaridine
  name: reagent-name-bicaridine
  group: Medicine
  desc: reagent-desc-bicaridine
  physicalDesc: reagent-physical-desc-opaque
  flavor: medicine
  color: "#ffaa00"
  metabolisms:
    Medicine:
      effects:
      - !type:SuppressPain
        amount: 1.2
        time: 30 # it accumulated 1.2 * quantity and then exists for 30 seconds.
      - !type:AdjustPainFeels
        conditions:
        - !type:ReagentCondition
          reagent: Bicaridine
          min: 15
        amount: 0.04
      - !type:HealthChange
        damage:
          groups:
            Brute: -2.5 # Was 2, Buffed due to limb damage changes(GoobStation)
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition # Goobstation - Yowie
          type: [ Yowie ]
          inverted: true
        - !type:ReagentCondition
          reagent: Bicaridine
          min: 15
        damage:
          types:
            Asphyxiation: 0.5
            Poison: 1.5
      - !type:Vomit
        conditions:
        - !type:ReagentCondition
          reagent: Bicaridine
          min: 30
        - !type:MetabolizerTypeCondition # Goobstation - Yowie
          type: [ Yowie ]
          inverted: true
        probability: 0.02
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: Bicaridine
          min: 15
      - !type:Drunk
      - !type:AdjustConsciousness
        conditions:
        - !type:ReagentCondition
          reagent: Bicaridine
          min: 10
        allowNewModifiers: true
        modifierType: Pain
        identifier: Suffocation
        amount: -1.2
        time: 12
      - !type:ChemAddMoodlet # Orion
        moodPrototype: MildPainkiller

