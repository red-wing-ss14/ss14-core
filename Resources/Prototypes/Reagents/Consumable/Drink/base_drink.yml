# SPDX-License-Identifier: MIT

- type: reagent
  id: BaseDrink
  group: NonAlcoholicDrinks # Goob - Drinks guidebook split
  abstract: true
  slipData:
    requiredSlipSpeed: 5 # Orion-Edit: 3.5 > 5 Light slippery curse
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 3
  reactiveEffects:
    Extinguish:
      methods: [ Touch ]
      effects:
      - !type:Extinguish
  plantMetabolism:
  - !type:PlantAdjustWater
    amount: 1
  tileReactions:
  - !type:ExtinguishTileReaction { }
  - !type:SpillIfPuddlePresentTileReaction { }

- type: reagent
  id: BaseSoda
  parent: BaseDrink
  abstract: true
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 0.1
  - !type:PlantAdjustWater
    amount: 0.1
  - !type:PlantAdjustHealth
    amount: -0.1
  footstepSound:
    collection: FootstepSlime
  fizziness: 0.5

- type: reagent
  id: BaseAlcohol
  group: AlcoholicDrinks # Goob - Drinks guidebook split
  abstract: true
  slipData:
    requiredSlipSpeed: 4.3 # Orion-Edit: 3.5 > 4.3 Light slippery curse
  friction: 0.4
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.06
  reactiveEffects:
    Flammable:
      methods: [ Touch ]
      effects:
      - !type:Flammable
  tileReactions:
  - !type:FlammableTileReaction
    temperatureMultiplier: 1.35
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 0.25
  - !type:PlantAdjustWater
    amount: 0.7

- type: reagent
  id: BaseJuice
  parent: BaseDrink
  abstract: true
  flavor: sweet
  footstepSound:
    collection: FootstepSlime
