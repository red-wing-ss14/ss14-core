- type: reagent
  id: Water
  name: reagent-name-water
  parent: BaseDrink
  desc: reagent-desc-water
  evaporationSpeed: 0.3
  absorbent: true
  physicalDesc: reagent-physical-desc-translucent
  # Orion-Start
  slipData:
    requiredSlipSpeed: 4.0
  # Orion-End
  flavor: water
  color: "#75b1f0"
  recognizable: true
  boilingPoint: 100.0
  meltingPoint: 0.0
  friction: 0.4
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 4
    Gas: # DeltaV - Feroxi get to breathe with this too!
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: true
        conditions:
        - !type:OrganType
          type: Slime
          shouldHave: true
        damage:
          types:
            Heat: 3
      - !type:Oxygenate
        conditions:
        - !type:OrganType
          type: Feroxi
      - !type:SatiateThirst
        conditions:
        - !type:OrganType
          type: Feroxi
        factor: 2
      - !type:Oxygenate
        conditions:
        - !type:OrganType
          type: FeroxiDehydrated
      - !type:SatiateThirst
        conditions:
        - !type:OrganType
          type: FeroxiDehydrated
        factor: 2
      # DeltaV Converts H2O into CO2 for Feroxi
      - !type:ModifyLungGas
        conditions:
        - !type:OrganType
          type: Feroxi
        ratios: # DeltaV no duplicating O2 >:3
          CarbonDioxide: 0.5
          WaterVapor: -1.0
      - !type:ModifyLungGas
        conditions:
        - !type:OrganType
          type: FeroxiDehydrated
        ratios: # DeltaV no duplicating O2 >:3
          CarbonDioxide: 0.5
