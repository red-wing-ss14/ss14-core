- type: reagent
  id: Blood
  name: reagent-name-blood
  group: Biological
  desc: reagent-desc-blood
  flavor: metallic
  color: "#800000"
  metamorphicSprite:
    sprite: Objects/Consumable/Drinks/bloodglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  recognizable: true
  standsout: true
  physicalDesc: reagent-physical-desc-ferrous
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 1.0
        conditions:
          - !type:MetabolizerTypeCondition
            type: [ Human ]
            inverted: true
      # Orion-Start
      - !type:ChemAddMoodlet
        moodPrototype: DrankBloodVampiric
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Bloodsucker ]
      - !type:ChemAddMoodlet
        moodPrototype: DrankBlood
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Bloodsucker ]
          inverted: true
        - !type:ReagentCondition
          reagent: Blood
          min: 0.1
      # Orion-End
    Food:
      effects:
        - !type:AdjustReagent
          reagent: UncookedAnimalProteins
          amount: 0.1
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Bloodsucker ]
        damage:
          groups:
            Brute: -3
            Burn: -1.25
  plantMetabolism:
    - !type:PlantAdjustWater
      amount: 0.5
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6

- type: reagent
