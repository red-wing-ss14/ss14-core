- type: reagent
  id: ZombieBlood
  name: reagent-name-zombie-blood
  group: Biological
  desc: reagent-desc-zombie-blood
  physicalDesc: reagent-physical-desc-necrotic
  flavor: bitter
  color: "#2b0700"
  metabolisms:
    Drink:
      # Disgusting!
      effects:
      - !type:SatiateThirst
        factor: -0.5
      - !type:ChemAddMoodlet # Orion
        moodPrototype: DrankZombieBlood
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition # Goobstation - Yowie
          type: [ Yowie ]
          inverted: true
        damage:
          types:
            Poison: 4
      - !type:Vomit
        conditions:
        - !type:MetabolizerTypeCondition # Goobstation - Yowie
          type: [ Yowie ]
          inverted: true
        probability: 0.25

- type: reagent
  id: Ichor
  name: reagent-name-ichor
  group: Biological
  desc: reagent-desc-ichor
  physicalDesc: reagent-physical-desc-roaring
  flavor: metallic
  color: "#f4692e"
  recognizable: true
  metabolisms:
    Drink:
      metabolismRate: 0.25 # Amour edit: 0.5 > 0.25
      effects:
      - !type:SatiateThirst
        factor: 1.5
      # Goob start
      - !type:SuppressPain
        amount: 4
        time: 28
      - !type:HealthChange # Goobstation - Make Ichor less shit
        damage:
          types:
            Heat: -3 # Amour edit: -5 > -3
            Shock: -3 # Amour edit: -5 > -3
            Cold: -3 # Amour edit: -5 > -3
            Caustic: -3 # Amour edit: -5 > -3
            Poison: -3 # Amour edit: -5 > -3
            Radiation: -3 # Amour edit: -5 > -3
            Asphyxiation: -3 # Amour edit: -5 > -3
            Bloodloss: -3 # Amour edit: -5 > -3
            Blunt: -3 # Amour edit: -5 > -3
            Slash: -3 # Amour edit: -5 > -3
            Piercing: -3 # Amour edit: -5 > -3
      - !type:ModifyBloodLevel
        amount: 3
      - !type:ModifyBleed
        amount: -1.5
  plantMetabolism:
  - !type:PlantAdjustWater
    amount: 1 # Goobstation
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6

