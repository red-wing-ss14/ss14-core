- type: entity
  parent: [ ClothingOuterBase, AllowSuitStorageClothing, BaseMajorContraband ]
  id: ClothingOuterArmorAbductor
  name: agent vest
  components:
  - type: Sprite
    sprite: _Shitmed/Clothing/OuterClothing/Armor/abductor.rsi
  - type: AbductorVest
  - type: ModifyDelayedKnockdown # Goobstation
    cancel: true
  - type: StaminaResistance
    damageCoefficient: 0.25
  - type: ItemSwitch
    state: stealth
    states:
      Stealth: !type:ItemSwitchState
        verb: Stealth
        hidden: true
        sprite:
          sprite: _Shitmed/Clothing/OuterClothing/Armor/abductor.rsi
          state: icon
        components:
        - type: Armor
          traumaDeductions:
            Dismemberment: 0.4
            OrganDamage: 0.4
            BoneDamage: 0.4
            VeinsDamage: 0
            NerveDamage: 0
          coverage:
          - Chest
          - Groin
          - Arm
          - Leg
          - Tail
          - Hand
          - Foot
          modifiers:
            coefficients:
              Blunt: 0.6
              Slash: 0.6
              Heat: 0.6
              Piercing: 0.6
              Radiation: 0.6
              Caustic: 0.4
        - type: ExplosionResistance
          damageCoefficient: 0.85
        - type: Clothing
          sprite: _Shitmed/Clothing/OuterClothing/Armor/abductor.rsi
          slots:
          - outerClothing

      Combat: !type:ItemSwitchState
        verb: Combat
        hidden: true
        sprite:
          sprite: _Shitmed/Clothing/OuterClothing/Armor/abductor.rsi
          state: combat-icon
        components:
        - type: Armor
          traumaDeductions:
            Dismemberment: 0.4
            OrganDamage: 0.4
            BoneDamage: 0.4
            VeinsDamage: 0
            NerveDamage: 0
          coverage:
          - Chest
          - Groin
          - Arm
          - Leg
          - Tail
          modifiers:
            coefficients:
              Blunt: 0.25
              Slash: 0.25
              Heat: 0.25
              Piercing: 0.25
              Radiation: 0.25
              Caustic: 0.1
        - type: ExplosionResistance
          damageCoefficient: 0.5
        - type: Clothing
          sprite: _Shitmed/Clothing/OuterClothing/Armor/abductor.rsi
          slots:
          - outerClothing
          equippedPrefix: combat

- type: entity
  parent: [ ClothingOuterStorageBase, AllowSuitStorageClothing, BaseMajorContraband]
  id: ClothingOuterCoatAbductor
  name: alien lab coat
  description: A suit of alien origin that protects from various injuries, as well as from chemical spills.
  components:
  - type: Sprite
    sprite: _Shitmed/Clothing/OuterClothing/Coats/abductor.rsi
  - type: Clothing
    sprite: _Shitmed/Clothing/OuterClothing/Coats/abductor.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Tail
    traumaDeductions:
      Dismemberment: 0.3
      OrganDamage: 0.3
      BoneDamage: 0.3
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Heat: 0.6
        Piercing: 0.6
        Radiation: 0.25 # Amour edit: 0.6 > 0.25
        Caustic: 0.25 # Amour edit: 0.4 > 0.25
        Cold: 0.6 # Amour edit: missing > 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: StaminaResistance
    damageCoefficient: 0.4
  - type: ModifyDelayedKnockdown
    delayDelta: 3
    knockdownTimeDelta: -3
