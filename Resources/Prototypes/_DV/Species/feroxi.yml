      points: 3
      required: false
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ FeroxiEars ]
    Snout:
      points: 1
      required: true
      defaultMarkings: [ FeroxiSnout ]
    Chest:
      points: 3
      required: false
    Arms:
      points: 4
      required: false
    Legs:
      points: 4
      required: false
    RightHand:
      points: 2
      required: false
    LeftHand:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ FeroxiTailAndDorsal ]

