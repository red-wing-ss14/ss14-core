- type: species
  id: Rodentia
  name: species-name-rodentia
  roundStart: true
  prototype: MobRodentia
  # Amour port: WD Slim body types START
  bodyTypes:
  - RodentiaNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#747474"
  markingLimits: MobRodentiaMarkingLimits
  dollPrototype: MobRodentiaDummy
  skinColoration: Hues
  maleFirstNames: NamesRodentiaMale
  femaleFirstNames: NamesRodentiaFemale
  lastNames: NamesRodentiaLast
  naming: LastFirst
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Rodentia.xml"
  pros:
  - species-rodentia-pro-cheek-pouch
  - species-rodentia-pro-hide-under-tables
  special:
  - species-rodentia-special-fit-in-duffel
  - species-rodentia-special-trash-foraging
  cons:
  - species-rodentia-con-physical-vulnerable
  - species-rodentia-con-mousetraps
  - species-rodentia-con-hunger-faster
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  sizeRatio: 1.1 # i don't know WHY, but disproportionate rodentia always look weird.
  minHeight: 0.8
  defaultHeight: 0.80
  maxHeight: 1.15
  minWidth: 0.80
  defaultWidth: 0.80
  maxWidth: 1.10
  # end Goobstation: port EE height/width sliders

# Amour port: WD Slim body types START
- type: bodyType
  id: RodentiaNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobRodentiaHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    Chest: MobRodentiaChest
    Groin: MobRodentiaGroin
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobRodentiaLArm
    RArm: MobRodentiaRArm
    LHand: MobRodentiaLHand
    RHand: MobRodentiaRHand
    LLeg: MobRodentiaLLeg
    RLeg: MobRodentiaRLeg
    LFoot: MobRodentiaLFoot
    RFoot: MobRodentiaRFoot

- type: markingPoints
  id: MobRodentiaMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke, its real *godo*
      points: 2
      required: false
      defaultMarkings: [ RodentiaTailDefault ]
    HeadTop:
      points: 8
      required: false
    HeadSide:
      points: 8
      required: true
      defaultMarkings: [ RodentiaHeadTopEarDefault ]
    Chest:
      points: 10
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false

