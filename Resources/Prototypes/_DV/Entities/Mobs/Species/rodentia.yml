- type: entity
  save: false
  name: Urist McRat
  parent: BaseMobSpeciesOrganic
  id: BaseMobRodentia
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Rodentia
  - type: Hunger
    baseDecayRate: 0.0467 # 33% faster than usual
  - type: Thirst # // Goob Station //
  - type: Carriable # Carrying system from nyanotrasen.
  - type: Inventory
    speciesId: rodentia
  - type: Icon
    sprite: _DV/Mobs/Species/Rodentia/parts.rsi
    state: full
  - type: Body
    prototype: Rodentia
  - type: Speech
    speechVerb: Rodentia
    speechSounds: Squeak
    allowedEmotes: ['Squeak']
  - type: LanguageKnowledge # Einstein Engines - Language
    speaks:
    - TauCetiBasic
    - Mouse # Can communicate with mice, I guess.
    understands:
    - TauCetiBasic
    - Mouse # There was no other language for them. This is how it used to be before EE removed them.
  - type: CheeseAccent
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 140
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ScaleData # Goobstation
    # scale: 0.8, 0.8 # Goobstation: port EE height/width sliders
  - type: Sprite
    # scale: 0.8, 0.8 # Goobstation: port EE height/width sliders
    layers:
      - map: [ "enum.HumanoidVisualLayers.Groin" ]
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
      - map: [ "enum.HumanoidVisualLayers.Head" ]
      - map: [ "enum.HumanoidVisualLayers.Snout" ]
      - map: [ "enum.HumanoidVisualLayers.Eyes" ]
      - map: [ "enum.HumanoidVisualLayers.RArm" ]
      - map: [ "enum.HumanoidVisualLayers.LArm" ]
      - map: [ "enum.HumanoidVisualLayers.RLeg" ]
      - map: [ "enum.HumanoidVisualLayers.LLeg" ]
      # Orion-Start
      - map: [ "underwear" ]
      - map: [ "undershirt" ]
      # Orion-End
      # Orion-Edit-Start: Moved under jumpsuit
      - map: ["enum.HumanoidVisualLayers.LFoot"]
      - map: ["enum.HumanoidVisualLayers.RFoot"]
      # Orion-Edit-End
      - map: [ "socks" ] # Orion
      - map: ["jumpsuit"]
      - map: [ "enum.HumanoidVisualLayers.LHand" ]
      - map: [ "enum.HumanoidVisualLayers.RHand" ]
      - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
        color: "#ffffff"
        sprite: Objects/Misc/handcuffs.rsi
        state: body-overlay-2
        visible: false
      - map: [ "id" ]
      - map: [ "gloves" ]
      - map: [ "wrists" ] # Orion
      - map: [ "shoes" ]
      - map: [ "earsright" ] # Orion
      - map: [ "ears" ]
      - map: [ "outerClothing" ]
      - map: [ "eyes" ]
      - map: [ "belt" ]
      - map: [ "neck" ]
      - map: [ "back" ]
      - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
      - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
      - map: [ "maskalt" ]
      - map: [ "enum.HumanoidVisualLayers.Hair" ]
      - map: [ "mask" ]
      - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
      - map: [ "enum.HumanoidVisualLayers.Tail" ]
      - map: [ "head" ]
      - map: [ "pocket1" ]
      - map: [ "pocket2" ]
      - map: [ "clownedon" ] # Dynamically generated
        sprite: "_DV/Effects/creampie.rsi"
        state: "creampie_rodentia"
        visible: false
  # Goobstation
  - type: ActionGrant
    actions:
    - ActionMouseCall
  # Goobstation
  - type: MobCallSource
    range: 25 # slightly raised
    whitelist:
      tags:
      - Mouse
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 2
        Slash: 3
  - type: Damageable
    damageModifierSet: Rodentia
  - type: Butcherable
    spawned:
    - id: FoodMeatRat
      amount: 5
  - type: TypingIndicator
    proto: rodentia
  - type: Vocal
    sounds:
      Male: MaleRodentia
      Female: FemaleRodentia
      Unsexed: MaleRodentia
  - type: Rummager
  - type: AlwaysTriggerMousetrap
  - type: PseudoItem
    storedOffset: -10,0
    shape:
      - 0, 0, 3, 2
      - 0, 2, 5, 4
  - type: MouthStorage
    mouthProto: CheekStorage
    openStorageAction: ActionOpenMouthStorage
    spitDamageThreshold: 3
  - type: CrawlUnderObjects
    actionProto: ActionToggleSneakMode

- type: entity
  save: false
  name: Rodentia Dummy
  parent: MobHumanDummy
  id: MobRodentiaDummy
  categories: [ HideSpawnMenu ]
  description: A dummy rodentia meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Rodentia
  - type: Inventory
    speciesId: rodentia
