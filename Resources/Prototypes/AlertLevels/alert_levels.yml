- type: alertLevels
  id: stationAlerts
  defaultLevel: green
  levels:
    green:
      announcement: alert-level-green-announcement
      sound: /Audio/_Orion/Misc/greenalert.ogg # Orion
      color: Green
      emergencyLightColor: LawnGreen
      shuttleTime: 600
    blue:
      announcement: alert-level-blue-announcement
      sound: /Audio/Misc/bluealert.ogg
      color: DodgerBlue
      forceEnableEmergencyLights: true
      emergencyLightColor: DodgerBlue
      shuttleTime: 600
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/beep_beep.ogg
        params:
          pitch: 1.4
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 120
      # Orion-End
    violet:
      announcement: alert-level-violet-announcement
      sound: /Audio/_Orion/Misc/code_danger.ogg # Orion-Edit
      color: Violet
      emergencyLightColor: Violet
      forceEnableEmergencyLights: true
      shuttleTime: 600
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/alien.ogg
        params:
          pitch: 1.1
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
      # Orion-End
    yellow:
      announcement: alert-level-yellow-announcement
      sound: /Audio/_Orion/Misc/code_danger.ogg # Orion-Edit
      color: Yellow
      emergencyLightColor: Goldenrod
      forceEnableEmergencyLights: true
      shuttleTime: 600
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/beep_beep.ogg
        params:
          volume: -12
          pitch: 0.89
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
      # Orion-End
    # Orion-Start
    amber:
      announcement: alert-level-amber-announcement
      sound: /Audio/_Orion/Misc/amberalert.ogg
      color: Orange
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 600
      alarmSound:
        path: /Audio/_Orion/Announcements/2_tone_alarm.ogg
        params:
          volume: -12
          pitch: 0.89
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
    # Orion-End
    red:
      announcement: alert-level-red-announcement
      sound: /Audio/_Orion/Misc/redalert.ogg # Orion-Edit
      color: Red
      emergencyLightColor: Red
      forceEnableEmergencyLights: true
      shuttleTime: 600 #No reduction in time as we don't have swiping for red alert like in /tg/. Shuttle times are intended to create friction, so having a way to brainlessly bypass that would be dumb.
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/2_tone_alarm.ogg
        params:
          volume: -12
          pitch: 0.89
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
      # Orion-End
    gamma:
      announcement: alert-level-gamma-announcement
      selectable: false
      sound: /Audio/_Orion/Misc/gammaalert.ogg # Orion-Edit
      disableSelection: true
      color: PaleVioletRed
      emergencyLightColor: PaleVioletRed
      forceEnableEmergencyLights: true
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/angry.ogg
        params:
          volume: -12
          pitch: 0.6
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
      # Orion-End
    delta:
      announcement: alert-level-delta-announcement
      selectable: false
      sound:
        path: /Audio/_Orion/Misc/delta.ogg # Orion-Edit
        params:
          volume: -3
      disableSelection: true
      color: DarkRed
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 1200
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Misc/soundlight/delta_light.ogg
        params:
          volume: -6
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 2.7
      # Orion-End
    epsilon:
      announcement: alert-level-epsilon-announcement
      selectable: false
      sound:
        path: /Audio/Misc/epsilon.ogg
        params:
          volume: -2
      disableSelection: true
      color: DarkViolet
      emergencyLightColor: DarkViolet
      forceEnableEmergencyLights: true
      shuttleTime: 1200
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/angry.ogg
        params:
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 8
      # Orion-End
    omicron: # Goobstation
      announcement: alert-level-omicron-announcement
      selectable: false
      sound:
        path: /Audio/_Goobstation/Misc/omicron.ogg
      disableSelection: true
      color: Ivory
      emergencyLightColor: Ivory
      forceEnableEmergencyLights: true
      shuttleTime: 2400
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/alien.ogg
        params:
          pitch: 0.85
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 60
      # Orion-End
    octarine: # DeltaV - Cosmic Cult
      announcement: alert-level-octarine-announcement
      selectable: false
      sound: /Audio/Announcements/Alerts/code_octarine.ogg
      disableSelection: true
      color: CadetBlue
      emergencyLightColor: CadetBlue
      forceEnableEmergencyLights: true
      shuttleTime: 600
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/angry.ogg
        params:
          pitch: 0.85
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    honk: # Goobstation
      announcement: alert-level-honk-announcement
      selectable: false
      emagSelectable: true
      sound:
        path: /Audio/Items/bikehorn.ogg
      color: Magenta
      emergencyLightColor: Magenta
      forceEnableEmergencyLights: true
      shuttleTime: 600
      # Orion-Start
      alarmSound:
        path: /Audio/Items/bikehorn.ogg
        params:
          pitch: 1.4
          volume: -12
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 120
      # Orion-End
