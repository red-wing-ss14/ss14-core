- type: entity
  save: false
  name: Urist McFelinid
  parent: BaseMobHuman
  id: MobFelinidBase
  abstract: true
  components:
  - type: Sprite
    # scale: 0.8, 0.8 # Goobstation: port EE height/width sliders
  - type: ScaleData # Goobstation
    # scale: 0.8, 0.8 # Goobstation: port EE height/width sliders
  - type: HumanoidAppearance
    species: Felinid
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 140
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Body
    prototype: Felinid
  - type: Damageable
    damageModifierSet: Felinid
  # Goobstation - Siouxcide, felinids have standard slow on damage numbers
# - type: SlowOnDamage
#   speedModifierThresholds:
#     60: 0.85  # 0.7 is base speed.
#     80: 0.75  # 0.5 is base speed.
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 4
        Piercing: 1
#  - type: DiseaseCarrier
#    naturalImmunities:
#    - OwOnavirus
  - type: Speech
    speechSounds: Alto
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    - Nekomimetic
    understands:
    - TauCetiBasic
    - Nekomimetic
  - type: DamageOnHighSpeedImpact # Landing on all fours!
    damage:
      types:
        Blunt: 1
  - type: Stamina
    baseCritThreshold: 75 # Goobstation - Siouxcide, felinids take 3 disabler shots to down
    animationThreshold: 40 # Goob edit
  - type: TypingIndicator
    proto: felinid
  - type: PseudoItem
    storedOffset: 0,17
    shape:
      - 0,0,1,4
      - 0,2,3,4
      - 4,0,5,4
  - type: Vocal
    wilhelm: "/Audio/Nyanotrasen/Voice/Felinid/cat_wilhelm.ogg"
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  #- type: OwOAccent this is just like that book by jorjorwell... 1984
  - type: Felinid
  - type: NoShoesSilentFootsteps
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - FelinidEmotes
  #- type: FootPrints # WD EDIT
  - type: Consciousness
    cap: 160
    threshold: 80
  # Amour port: WD Slim body types START
  - type: Inventory
    femaleDisplacements:
      jumpsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: jumpsuit
      shoes-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: shoes
      gloves-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: gloves
      outerClothing-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: outer
      hardsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: hardsuit
      suit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: suit
  # Amour port: WD Slim body types END

