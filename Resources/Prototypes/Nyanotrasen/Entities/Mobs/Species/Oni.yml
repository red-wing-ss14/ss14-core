- type: entity
  parent: BaseMobHuman
  name: Urist McOni
  id: MobOniBase
  abstract: true
  components:
  - type: Speech
    speechSounds: Baritone
    speechVerb: Oni
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic # Nothing else because Rouge said she was adding a language for Oni
    - Gruntish # Goob - Oni Language
    understands:
    - TauCetiBasic
    - Gruntish # Goob - Oni Language
  - type: HumanoidAppearance
    species: Oni
  - type: Sprite
    # scale: 1.2, 1.2 # Goobstation: port EE height/width sliders
  - type: ScaleData # Goobstation
    # scale: 1.2, 1.2 # Goobstation: port EE height/width sliders
  - type: PlayerToolModifier
    pryTimeMultiplier: 0.6
  - type: BonusStaminaDamage
    multiplier: 1.25
  - type: BonusMeleeDamage
    damageModifierSet:
      coefficients:
        Blunt: 1.25
        Slash: 1.25
        Piercing: 1.25
        Asphyxiation: 1.25
        Structural: 1.25
  - type: Body
    prototype: Oni
  - type: LightweightDrunk
    boozeStrengthMultiplier: 0.5 # REAL hard to get drunk
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35 # Goobstation: port EE height/width sliders
        density: 220
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: TypingIndicator
    proto: oni
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Oni
  # Amour port: WD Slim body types START
  - type: Inventory
    femaleDisplacements:
      jumpsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: jumpsuit
      shoes-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: shoes
      gloves-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: gloves
      outerClothing-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: outer
      hardsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: hardsuit
      suit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: suit
  # Amour port: WD Slim body types END

