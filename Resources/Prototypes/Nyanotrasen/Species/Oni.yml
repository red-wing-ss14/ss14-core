- type: species
  id: Oni
  name: species-name-oni
  roundStart: true
  prototype: MobOni
  dollPrototype: MobOniDummy
  markingLimits: MobOniMarkingLimits
  # Amour port: WD Slim body types START
  bodyTypes:
  - HumanNormal
  # Amour port: WD Slim body types END
  skinColoration: Hues
  maleFirstNames: NamesOniFirstMale
  femaleFirstNames: NamesOniFirstFemale
  lastNames: NamesOniLast
  naming: LastNoFirst
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Oni.xml"
  pros:
  - Получают на 15% меньше тупого, колющего и режущего урона.
  - Наносят на 25% больше тупого, режущего, колющего, стамины, и структурного урона в ближнем бою.
  - Могут с лёгкостью тянуть другие расы и предметы, по сравнению с человеком.
  - Получают на 10% меньше урона от холода.
  - Получают на 20% меньше урона от огня и тепла.
  special:
  - Они больше чем люди, из-за чего по ним легче попасть.
  - Могут есть многие продукты даже сырыми.
  cons:
  - Они не способны метко стрелять ни из какого оружия.
  - Получают на 50% больше урона от святого оружия и источников.
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  minHeight: 1.0 # RW 1.11 > 1.0
  defaultHeight: 1.2
  maxHeight: 1.35
  minWidth: 1.0 # RW 1.1 > 1.0
  defaultWidth: 1.2
  maxWidth: 1.3
  # end Goobstation: port EE height/width sliders

