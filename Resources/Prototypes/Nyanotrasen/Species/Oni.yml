- type: species
  id: Oni
  name: species-name-oni
  roundStart: true
  prototype: MobOni
  dollPrototype: MobOniDummy
  markingLimits: MobOniMarkingLimits
  # Amour port: WD Slim body types START
  bodyTypes:
  - HumanNormal
  # Amour port: WD Slim body types END
  skinColoration: Hues
  maleFirstNames: NamesOniFirstMale
  femaleFirstNames: NamesOniFirstFemale
  lastNames: NamesOniLast
  naming: LastNoFirst
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Oni.xml"
  pros:
  - species-oni-pro-damage-resist
  - species-oni-pro-melee-damage
  - species-oni-pro-strong-pull
  - species-oni-pro-cold-resist
  - species-oni-pro-fire-resist
  special:
  - species-oni-special-large-target
  - species-oni-special-raw-food
  cons:
  - species-oni-con-ranged-accuracy
  - species-oni-con-holy-vulnerable
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  minHeight: 1.0 # RW 1.11 > 1.0
  defaultHeight: 1.2
  maxHeight: 1.35
  minWidth: 1.0 # RW 1.1 > 1.0
  defaultWidth: 1.2
  maxWidth: 1.3
  # end Goobstation: port EE height/width sliders

- type: markingPoints
  id: MobOniMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ OniHornDoubleCurved ]
    HeadSide:
      points: 3
      required: true
      defaultMarkings: [ PointyEarsUpwards ]
    Snout:
      points: 2
      required: false
    Chest:
      points: 8
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false
    # RW start
    Wings:
      points: 1
      required: false
    # RW end
