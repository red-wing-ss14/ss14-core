- type: species
  id: Moth
  name: species-name-moth
  roundStart: true
  prototype: MobMoth
  # Amour port: WD Slim body types START
  bodyTypes:
    - MothNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#ffda93"
  markingLimits: MobMothMarkingLimits
  dollPrototype: MobMothDummy
  skinColoration: Hues
  maleFirstNames: NamesMothFirstMale
  femaleFirstNames: NamesMothFirstFemale
  lastNames: NamesMothLast
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Moth.xml"
  pros:
  - species-moth-pro-cold-resist
  - species-moth-pro-wing-jump
  - species-moth-pro-zero-gravity
  special:
  - species-moth-special-temperature-threshold
  cons:
  - species-moth-con-fire-vulnerable
  - species-moth-con-flammable
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.8
  defaultHeight: 1
  maxHeight: 1.20
  minWidth: 0.80
  defaultWidth: 1
  maxWidth: 1.25
  # end Goobstation: port EE height/width sliders

# Amour port: WD Slim body types START
- type: bodyType
  id: MothNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobMothHead
    Face: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobMothChest
    Groin: MobMothGroin # Goob
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobMothEyes
    LArm: MobMothLArm
    RArm: MobMothRArm
    LHand: MobMothLHand
    RHand: MobMothRHand
    LLeg: MobMothLLeg
    RLeg: MobMothRLeg
    LFoot: MobMothLFoot
    RFoot: MobMothRFoot

- type: humanoidBaseSprite
  id: MobMothEyes
  baseSprite:
    sprite: Mobs/Species/Moth/parts.rsi
    state: eyes

- type: markingPoints
  id: MobMothMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 2 # Amour edit
      required: true
      defaultMarkings: [ MothWingsDefault ]
    Snout:
      points: 1
      required: false
    HeadTop:
      points: 6
      required: true
      defaultMarkings: [ MothAntennasDefault ]
    HeadSide:
      points: 8
      required: false
    Head:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 8
      required: false
    Chest:
      points: 8
      required: false

    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 2
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 2
      required: false

