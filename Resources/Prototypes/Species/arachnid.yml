- type: species
  id: Arachnid
  name: species-name-arachnid
  roundStart: true
  prototype: MobArachnid
  # Amour port: WD Slim body types START
  bodyTypes:
    - ArachnidNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#385878"
  markingLimits: MobArachnidMarkingLimits
  dollPrototype: MobArachnidDummy
  skinColoration: Hues
  maleFirstNames: NamesArachnidFirst
  femaleFirstNames: NamesArachnidFirst
  lastNames: NamesArachnidLast
  sexes:
  - Unsexed
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Arachnid.xml"
  pros:
  - species-arachnid-pro-web
  special:
  - species-arachnid-special-silk
  - species-arachnid-special-stomach
  - species-arachnid-special-hunger-damage
  cons:
  - species-arachnid-con-damage
  - species-arachnid-con-asphyxia
  - species-arachnid-con-temperature
  # Orion-End

# Amour port: WD Slim body types START
- type: bodyType
  id: ArachnidNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
