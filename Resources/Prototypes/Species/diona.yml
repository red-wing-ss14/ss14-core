- type: species
  id: Diona
  name: species-name-diona
  roundStart: true
  prototype: MobDiona
  # Amour port: WD Slim body types START
  bodyTypes:
    - DionaNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#cdb369"
  markingLimits: MobDionaMarkingLimits
  dollPrototype: MobDionaDummy
  skinColoration: Hues
  maleFirstNames: NamesDionaFirst
  femaleFirstNames: NamesDionaFirst
  lastNames: NamesDionaLast
  naming: TheFirstofLast
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Diona.xml"
  pros:
  - species-diona-pro-asphyxia
  - species-diona-pro-damage-resist
  - species-diona-pro-metabolism-slow
  - species-diona-pro-co2-breathe
  - species-diona-pro-infrequent-breathe
  - species-diona-pro-shards-immune
  - species-diona-pro-nymph-revive
  special:
  - species-diona-special-fertilizer
  - species-diona-special-slow-metabolism
  - species-diona-special-hunger-bleed
  - species-diona-special-no-shoes
  cons:
  - species-diona-con-fire-shock-vulnerable
  - species-diona-con-no-run
  - species-diona-con-flammable
  # Orion-End

# Amour port: WD Slim body types START
- type: bodyType
  id: DionaNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobDionaHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobDionaChest
    Groin: MobDionaGroin
    Eyes: MobDionaEyes
    LArm: MobDionaLArm
    RArm: MobDionaRArm
    LHand: MobDionaLHand
    RHand: MobDionaRHand
    LLeg: MobDionaLLeg
    RLeg: MobDionaRLeg
    LFoot: MobDionaLFoot
    RFoot: MobDionaRFoot

- type: markingPoints
  id: MobDionaMarkingLimits
  onlyWhitelisted: true
  points:
    Head:
      points: 4
      required: false
    HeadTop:
      points: 4
      required: false
    HeadSide:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 3
      required: false
    Chest:
      points: 4
      required: false

    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 2
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 2
      required: false
    Overlay:
      points: 1
      required: true
      defaultMarkings: [ DionaVineOverlay ]

