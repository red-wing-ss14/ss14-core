- type: species
  id: Reptilian
  name: species-name-reptilian
  roundStart: true
  prototype: MobReptilian
  # Amour port: WD Slim body types START
  bodyTypes:
    - ReptilianNormal
    - ReptilianSlim
  # Amour port: WD Slim body types END
  defaultSkinTone: "#34a223"
  markingLimits: MobReptilianMarkingLimits
  dollPrototype: MobReptilianDummy
  skinColoration: Hues
  maleFirstNames: NamesReptilianMale
  femaleFirstNames: NamesReptilianFemale
  naming: FirstDashFirst
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Reptilian.xml"
  pros:
  - Имеют большую толерантность к боли.
  - Могут таскать предметы хвостом.
  special:
  - Имеют отличимый от других рас порог температуры. При низкой температуре получают 0.1 холода в секунду. При высокой температуре получают 1.5 ожогов в секунду.
  - Имеет животный желудок.
  cons:
  - На 30% чувствительнее к холоду, чем человек.
  # Orion-End

# Amour port: WD Slim body types START
- type: bodyType
  id: ReptilianNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobReptilianHead
    Face: MobHumanoidAnyMarking # Goob?
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobReptilianChest
    Groin: MobReptilianGroin
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobReptilianLArm
    RArm: MobReptilianRArm
    LHand: MobReptilianLHand
    RHand: MobReptilianRHand
    # Amour port: WD Slim body types START
    LLeg: MobReptilianDigiLLeg
    RLeg: MobReptilianDigiRLeg
    LFoot: MobReptilianDigiLFoot
    RFoot: MobReptilianDigiRFoot
    # Amour port: WD Slim body types END

- type: markingPoints
  id: MobReptilianMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ LizardTailSmooth ]
    Snout:
      points: 1
      required: true
      defaultMarkings: [ LizardSnoutRound ]
    HeadTop:
      points: 3
      required: false
    HeadSide:
      points: 6 # WWDP-Edit
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    Chest:
      points: 8
      required: false

    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false

