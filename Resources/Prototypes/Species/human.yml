- type: species
  id: Human
  name: species-name-human
  roundStart: true
  prototype: MobHuman
  # Amour port: WD Slim body types START
  bodyTypes:
  - HumanNormal
  - HumanSlim
  # Amour port: WD Slim body types END
  markingLimits: MobHumanMarkingLimits
  dollPrototype: MobHumanDummy
  skinColoration: HumanToned
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Human.xml"
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.90
  defaultHeight: 1
  maxHeight: 1.20
  minWidth: 0.90
  defaultWidth: 1
  maxWidth: 1.10
  # end Goobstation: port EE height/width sliders

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
# Amour port: WD Slim body types START
- type: bodyType
  id: HumanNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Special: MobHumanoidAnyMarking
    Head: MobHumanHead
    Face: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobHumanChest
    Groin: MobHumanGroin
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
    LArm: MobHumanLArm
    RArm: MobHumanRArm
    LHand: MobHumanLHand
    RHand: MobHumanRHand
    LLeg: MobHumanLLeg
    RLeg: MobHumanRLeg
    LFoot: MobHumanLFoot
    RFoot: MobHumanRFoot
    Tail: MobHumanoidAnyMarking # Goobstation - Required for felinids, harpies & tajaran.
    HeadSide: MobHumanoidAnyMarking # Oni port from DeltaV
    Wings: MobHumanoidAnyMarking # RW: Required for oni.

- type: markingPoints
  id: MobHumanMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke, its real *godo*
      points: 2
      required: false
    HeadTop:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 8
      required: false
    HeadSide:
      points: 8
      required: false
    Chest:
      points: 10
      required: false

    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false

