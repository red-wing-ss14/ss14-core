- type: species
  id: SlimePerson
  name: species-name-slime
  roundStart: true
  prototype: MobSlimePerson
  metabolismLimit: 6 # Amour add
  # Amour port: WD Slim body types START
  bodyTypes:
    - SlimeNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#b8b8b8"
  markingLimits: MobSlimeMarkingLimits
  dollPrototype: MobSlimePersonDummy
  skinColoration: Hues
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/SlimePerson.xml"
  pros:
  - species-slime-pro-blunt-poison-resist
  - species-slime-pro-vacuum-survival
  - species-slime-pro-internal-storage
  - species-slime-pro-reagent-digest
  special:
  - species-slime-special-alcohol-sensitivity
  - species-slime-special-infrequent-breathe
  - species-slime-special-slow-metabolism
  - species-slime-special-n2-breathe
  - species-slime-special-slime-blood
  cons:
  - species-slime-con-cold-slash-pierce-vulnerable
  - species-slime-con-water-vulnerable
  - species-slime-con-pressure-vulnerable
  # Orion-End

# Amour port: WD Slim body types START
- type: bodyType
  id: SlimeNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Face: MobHumanoidAnyMarking
    Head: MobSlimeHead
    HeadSide: MobHumanoidAnyMarking
    Hair: MobSlimeMarkingFollowSkin
    FacialHair: MobSlimeMarkingFollowSkin
    Tail: MobSlimeMarkingFollowSkin # Amour edit
    HeadTop: MobSlimeMarkingFollowSkin # Amour edit
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobSlimeChest
    Groin: MobSlimeGroin
    Eyes: MobHumanoidEyes
    LArm: MobSlimeLArm
    RArm: MobSlimeRArm
    LHand: MobSlimeLHand
    RHand: MobSlimeRHand
    LLeg: MobSlimeLLeg
    RLeg: MobSlimeRLeg
    LFoot: MobSlimeLFoot
    RFoot: MobSlimeRFoot

- type: markingPoints
  id: MobSlimeMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    HeadSide:
      points: 3
      required: false
    FacialHair:
      points: 1
      required: false
    Tail: # Amour edit
      points: 1
      required: false
    HeadTop: # Amour edit
      points: 3
      required: false
    Chest:
      points: 8
      required: false
    UndergarmentBottom: # Goob
      points: 1
      required: false
    UndergarmentTop: # Goob
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 2
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 2
      required: false
    # Amour start
    BodyPartGradient:
      points: 11
      required: false
    BodyGradient:
      points: 1
      required: false
    # Amour end

