- type: species
  id: SlimePerson
  name: species-name-slime
  roundStart: true
  prototype: MobSlimePerson
  metabolismLimit: 6 # Amour add
  # Amour port: WD Slim body types START
  bodyTypes:
    - SlimeNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#b8b8b8"
  markingLimits: MobSlimeMarkingLimits
  dollPrototype: MobSlimePersonDummy
  skinColoration: Hues
  # Orion-Start
  category: Classic
  description: "/ServerInfo/_Orion/SpeciesDescriptions/SlimePerson.xml"
  pros:
  - Получают на 40% меньше урона от ушибов и на 20% меньше от ядов.
  - Способны прожить в условиях вакуума дольше чем человек.
  - Обладают встроенным хранилищем внутри себя.
  - Могут переваривать одновременно 6 реагентов.
  special:
  - Быстрее пьянеют.
  - Дышат реже человека в 5 раз, следовательно получают по 0.2 урона удушьем.
  - Скорость метаболизма - 0.13 единиц. Это означает, что у них всё усваивается медленней, чем у человека.
  - Дышат азотом (N2) и выдыхают его оксид (N2O).
  - Слизь слаймолюда не восстанавливается железом. Тем не менее, слизь является умеренно питательным источником пищи для других существ, но пить кровь своих товарищей по команде обычно считается неприемлемым.
  cons:
  - Получают на 50% больше урона холодоми и на 20% больше от порезов и уколов.
  - При контакте с водой получает 12 термического урона. Инъекции, питьё воды, хождение по лужам, вдыхание водяного пара - не наносят урон.
  - Получают повышенный урон от давления.
  # Orion-End

