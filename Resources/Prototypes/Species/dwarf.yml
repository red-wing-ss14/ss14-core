- type: species
  id: Dwarf
  name: species-name-dwarf
  roundStart: true
  prototype: MobDwarf
  # Amour port: WD Slim body types START
  bodyTypes:
  - HumanNormal
  # Amour port: WD Slim body types END
  markingLimits: MobHumanMarkingLimits
  dollPrototype: MobDwarfDummy
  skinColoration: HumanToned
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Dwarf.xml"
  pros:
  - Обладают врождённой чувствительностью к наличию рудоносных жил в радиусе 3х метров.
  - Этанол лечит на 0.66 уколов и ушибов и на 0.68 порезов, при наличии менее 5 единиц в организме.
  special:
  - Желудок вмещает 75 единиц веществ.
  - Не может быть вызвана рвота от алкоголя.
  cons:
  - Дышат чаще в 2 раза, следовательно без воздуха получают по 2 урона удушьем.
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  sizeRatio: 1
  minHeight: 0.9
  defaultHeight: 1
  maxHeight: 1.2
  minWidth: 0.9
  defaultWidth: 1
  maxWidth: 1.1
  # end Goobstation: port EE height/width sliders
