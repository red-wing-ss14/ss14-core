- type: entity
  parent: MarkerBase
  id: SpawnPointGulag
  name: gulag spawn point
  components:
  - type: GulagSpawnPoint
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - state: prisoner

- type: entity
  parent: CrateGenericSteel
  id: CrateGulag
  categories: [ HideSpawnMenu ]
  components:
  - type: GulagFillContainer

- type: entity
  parent: CollarShock
  id: GulagRegulatingCollar
  categories: [ HideSpawnMenu ]
  name: regulating collar
  description: A collar that guarantees good behavior from labor camp workers.
  components:
  - type: GulagRegulatingCollar
  - type: Unremoveable

- type: entity
  parent: GulagRegulatingCollar
  id: GulagRegulatingCollarGoodBoy
  categories: [ HideSpawnMenu ]
  components:
  - type: GulagRegulatingCollar
    harmSentenceExtension: 0
    liquidationSentenceExtension: 0

- type: entity
  id: GulagRegulatingCollarExplosionEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 1
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      sprite: _Orion/Effects/tile_fire_explode.rsi
      state: 1
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: BaseMachinePowered
  id: GulagOreProcessor
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Structures/Machines/ore_processor.rsi
    layers:
    - state: icon
      map: [ "enum.LatheVisualLayers.IsRunning" ]
    - state: unlit
      shader: unshaded
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
    - state: inserting
      map: [ "enum.MaterialStorageVisualLayers.Inserting" ]
    - state: panel
      map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
  - type: MaterialStorage
    canEjectStoredMaterials: false
    disallowOreEjection: true
    ignoreMaterialWhiteList: true
    ignoreColor: true
    whitelist:
      tags:
      - Ore
  - type: GulagOreProcessor
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Transform
    anchored: true
