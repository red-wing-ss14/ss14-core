- type: entity
  id: LavalandCursedHeart
  parent: BaseHumanOrgan
  name: heart
  description: "I feel bad for the heartless bastard who lost this."
  components:
  # RW start
  - type: Heart
  - type: Appearance
  - type: Organ
    slotId: heart
    intCap: 15
    integrity: 15
    integrityThresholds:
      Normal: 15
      Damaged: 6
      Destroyed: 0
  # RW end
  - type: Sprite
    sprite: _Lavaland/Objects/Specific/Lavaland/loot.rsi
    state: cursed_heart
  - type: Item
    size: Small
  - type: CursedHeartGrant

- type: entity
  id: LavalandVampirismCrystal
  parent: BasePKAUpgrade
  name: a red crystal
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Specific/Lavaland/loot.rsi
    state: crystal
  - type: ItemUpgrade
    name: gun-upgrade-vampirism-name
  - type: GunUpgradeVampirism
    damageOnHit:
      types:
        Slash: -1.5
        Piercing: -1.5
        Blunt: -1.5
