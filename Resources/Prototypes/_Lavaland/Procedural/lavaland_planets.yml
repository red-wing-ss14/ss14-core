- type: lavalandPlanet
  id: LavalandPlanet
  name: lavaland-planet-name-lavaland
  mapLight: "#f0a959"
  biome: LavaLand
  atmosphere:
    volume: 2500
    immutable: True
    temperature: 308.4523 # 35.3023 C
    moles:
    - 10.524779 # oxygen, not enough for breathing
    - 25.10312 # nitrogen
    - 8.21301 # carbon dioxide
  markers:
  - RandomTendrilLavaland
  - RandomMobLavaland
  - OreIron
  - OreCoal
  - OreQuartz
  - OreGold
  - OreSilver
  - OrePlasma
  - OreUranium
  - OreBananium
  - OreArtifactFragment
  - OreDiamond
  - OreBSCrystal
  #- OreGibtonite # It's broken right now sadly because of how Gatherable works :(
  addComponents:
  - type: FTLDestination
    whitelist: # TODO fix shuttles FTLing on planets and remove this whitelist
      components:
      - MiningShuttle
  - type: WeatherScheduler # Regular ash storms
    stages:
    - duration: # 10-15 minutes of calm
        min: 600
        max: 900
    - weather: AshfallLight
      duration:
        min: 90
        max: 120
    - weather: Ashfall
      duration:
        min: 90
        max: 120
    - weather: AshfallLight
      duration:
        min: 30
        max: 30
  - type: LightCycle
    duration: 1200 # 20 minutes
    minLightLevel: 0.4 # You can barely see things moving at this light level
