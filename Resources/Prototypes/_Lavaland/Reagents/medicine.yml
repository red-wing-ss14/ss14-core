- type: reagent
  id: MinersSalve
  name: reagent-name-minerssalve
  group: Medicine
  desc: reagent-desc-minerssalve
  physicalDesc: reagent-physical-desc-shiny
  flavor: metallic
  color: "#f2c777"
  recognizable: true
  metabolisms:
    Medicine:
      effects:
      - !type:ModifyBloodLevel
        amount: 1.5
      - !type:HealthChange
        damage:
          groups:
            Burn: -1.75
            Brute: -1.75
          types:
            Bloodloss: -1.25
      - !type:ModifyBloodLevel
        amount: 1.5
        conditions:
        - !type:PressureThresholdCondition
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:HealthChange
        damage:
          groups:
            Burn: -4.75
            Brute: -4.75
          types:
            Bloodloss: -1.25
        conditions:
        - !type:PressureThresholdCondition
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: MinersSalve
          min: 21
        - !type:PressureThresholdCondition
          min: 1
          max: 50
          worksOnLavaland: true
        damage:
          types:
            Poison: 5
            Cold: 5
      - !type:Jitter
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.1
      - !type:Emote
        emote: Scream
        probability: 0.05
        #It's balanced I swear!

- type: reagent
  id: Luxurium
  name: reagent-name-luxurium
  group: Medicine
  desc: reagent-desc-luxurium
  physicalDesc: reagent-physical-desc-powdery
  flavor: metallic
  color: "#302f70"
  recognizable: true
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          types:
            Cold: 2
            Asphyxiation: 1.75
            Bloodloss: 3
          groups:
            Toxin: 1.5
            Brute: 7.5
            Burn: 4
            Airloss: 1.5
      - !type:HealthChange
        damage:
          types:
            Cold: -2
            Asphyxiation: -1.75
            Bloodloss: -3
          groups:
            Toxin: -1.5
            Brute: -7.5
            Burn: -4
            Airloss: -1.5
        conditions:
          - !type:PressureThresholdCondition
            min: 1
            max: 50
            worksOnLavaland: true
      # Cuts the amount healed roughly by 50% when in normal pressure.

