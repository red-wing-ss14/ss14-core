# For mantles
- type: loadoutEffectGroup
  id: MasterHoP
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobHeadOfPersonnel
      time: 20h

# Goobstation - For Ensembles
- type: loadoutEffectGroup
  id: GrandMasterHoP
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobHeadOfPersonnel
      time: 360000 # 100 hrs

# Professional HoP Time
- type: loadoutEffectGroup
  id: ProfessionalHoP
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobHeadOfPersonnel
      time: 15h # special reward for HoP mains

# Jumpsuit
- type: loadout
  id: HoPJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitHoP


- type: loadout
  id: HoPJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtHoP


- type: loadout # goob
  id: HoPJumpsuitMilitary
  equipment:
    jumpsuit: ClothingUniformJumpsuitMilitaryHoP


# Head
- type: loadout
  id: HoPHead
  equipment:
    head: ClothingHeadHatHopcap

# Neck
- type: loadout
  id: HoPCloak
  equipment:
    neck: ClothingNeckCloakHop

- type: loadout
  id: HoPMantle
  equipment:
    neck: ClothingNeckMantleHOP
#  effects: # Orion-Edit: Removed
#  - !type:GroupLoadoutEffect
#    proto: MasterHoP

- type: startingGear
  id: HoPMantle
  equipment:
    neck: ClothingNeckMantleHOP

- type: loadout # Goobstation - Ensembles
  id: HeadOfPersonnelEnsemble
  equipment:
    neck: ClothingNeckEnsembleHeadOfPersonnel
  effects:
  - !type:GroupLoadoutEffect
    proto: GrandMasterHoP

# Back
- type: loadout
  id: HoPBackpackIan
  effects:
  - !type:GroupLoadoutEffect
    proto: ProfessionalHoP
  equipment:
    back: ClothingBackpackIan

# Outerclothing
- type: loadout
  id: HoPWintercoat
  equipment:
    outerClothing: ClothingOuterWinterHoP
