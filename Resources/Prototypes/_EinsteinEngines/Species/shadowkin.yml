- type: species
  id: Shadowkin
  name: species-name-shadowkin
  roundStart: true
  prototype: MobShadowkin
  # Amour port: WD Slim body types START
  bodyTypes:
    - ShadowkinNormal
  # Amour port: WD Slim body types END
  defaultSkinTone: "#FFFFFF"
  markingLimits: MobShadowkinMarkingLimits
  dollPrototype: MobShadowkinDummy
  skinColoration: Hues
  # RW start
  naming: FirstLast
  maleFirstNames: NamesShadowkinFirst
  femaleFirstNames: NamesShadowkinFirst
  lastNames: NamesShadowkinLast
  # RW end
  minAge: 18
  maxAge: 250
  youngAge: 80
  oldAge: 175
  sexes:
    - Male
    - Female
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Shadekin.xml"
  pros:
  - species-shadowkin-pro-night-vision
  special:
  - species-shadowkin-special-empathy-mind
  cons:
  - species-shadowkin-con-fire-vulnerable
  - species-shadowkin-con-blood-recovery
  - species-shadowkin-con-flashbang-vulnerable
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.80
  defaultHeight: 0.85
  maxHeight: 1.15
  minWidth: 0.77
  defaultWidth: 0.85
  maxWidth: 1.15
  # end Goobstation: port EE height/width sliders

# Amour port: WD Slim body types START
- type: bodyType
  id: ShadowkinNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
    Head: MobShadowkinHead
    Snout: MobShadowkinAnyMarkingFollowSkin
    HeadTop: MobShadowkinAnyMarking
    HeadSide: MobShadowkinAnyMarkingFollowSkin
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Tail: MobShadowkinAnyMarkingFollowSkin
    Chest: MobShadowkinChest
    Groin: MobShadowkinGroin
    Eyes: MobShadowkinEyes
    LArm: MobShadowkinLArm
    RArm: MobShadowkinRArm
    LHand: MobShadowkinLHand
    RHand: MobShadowkinRHand
    LLeg: MobShadowkinLLeg
    RLeg: MobShadowkinRLeg
    LFoot: MobShadowkinLFoot
    RFoot: MobShadowkinRFoot

- type: markingPoints
  id: MobShadowkinMarkingLimits
  points:
    Tail:
      points: 1
      required: true
      defaultMarkings: [TailShadowkin]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [EarsShadowkin]
    Chest:
      points: 8
      required: false
    Legs:
      points: 8
      required: false
    Arms:
      points: 8
      required: false

- type: humanoidBaseSprite
  id: MobShadowkinAnyMarkingFollowSkin
  markingsMatchSkin: true

