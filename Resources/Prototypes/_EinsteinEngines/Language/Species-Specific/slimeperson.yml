# Spoken by slime race and slimes.
# Derived from Basque Language - Goob
- type: language
  id: Bubblish
  isVisibleLanguage: true
  speech:
    color: "#24d1b9" # Goob Edit - Original "#00a3e2dd"
    fontId: ComicSansMS # Orion-Edit
    boldFontId: ComicSansMS # Orion-Edit
    fontSize: 13 # Goob Edit - Increased by 1 to account for slight font size difference.
  # Orion-Start
  icon:
    sprite: _Orion/Interface/Chat/language.rsi
    state: slime
  # Orion-End
  obfuscation:
    !type:SyllableObfuscation
    minSyllables: 1
    maxSyllables: 5 # Goob Edit - Make it more chaotic.
    replacement:
    - blob
    - plop
    - plip
    - pip
    - pop
    - bop
    - boop
    - gurgle
    - glop
    - glip
    - gloop
    - gwup
    - gwip
    - glorp
    # Basque
    - ez
    - txa
    - zun
    - gor
    - itz
