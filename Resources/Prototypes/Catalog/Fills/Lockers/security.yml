- type: entity
  id: LockerWardenFilledHardsuit
  suffix: Filled, Hardsuit
  parent: LockerWarden
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: FillLockerWarden
        - !type:NestedSelector
          tableId: FillLockerWardenHarduit

- type: entity
  id: LockerWardenFilled
  suffix: Filled
  parent: LockerWarden
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerWarden

- type: entityTable
  id: FillLockerWarden
  table: !type:AllSelector
    children:
    - id: WeaponTaser
    - id: FlashlightSeclite
    #- id: WeaponDisabler # Goobstation (Disablers in belts)
    - id: ClothingBeltSecurityFilled
#    - id: Flash # Orion-Edit: Removed
    - id: ClothingEyesGlassesSecurity
    - id: ClothingHandsGlovesCombat
#    - id: ClothingShoesBootsJack # Orion-Edit: Removed
    - id: ClothingOuterCoatWarden
    - id: ClothingOuterWinterWarden
    - id: ClothingOuterCoatWardenBlue # Orion
    - id: RubberStampWarden
    - id: DoorRemoteArmory
    #- id: HoloprojectorSecurity Goob, its in your belt
    - id: BookSpaceLaw
    - id: ClothingBackpackElectropack
      amount: 2
    - id: RemoteSignaller
      amount: 2
    #- id: NetworkConfigurator # Goobstation?
    - id: Binoculars
    - id: WeaponEnergyShotgun # Goobstation?
    - id: ClothingHandsGlovesKravMaga # Goobstation - Martial Arts
    - id: BoxLethalInjection # Goobstation
    - id: ClothingHeadsetAltWarden # Goobstation
    - id: Multitool # Goobstation
    - id: Wrench # Goobstation
    - id: ContrabandDetectorFlatpack # Goobstation
      amount: 2 # Orion
    - id: SecurityMegaphone # goob - loudspeakers

- type: entityTable
  id: FillLockerWardenHarduit
  table: !type:AllSelector
    children:
    - id: ClothingOuterHardsuitWarden
    - id: OxygenTankFilled
    - id: ClothingMaskBreath

- type: entity
  id: LockerSecurityFilled
  suffix: Filled
  parent: LockerSecurity
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerSecurity

- type: entityTable
  id: FillLockerSecurity
  table: !type:AllSelector
    children:
    - id: WeaponTaser
    - id: FlashlightSeclite
      prob: 0.8
    #- id: WeaponDisabler # Goobstation (Disablers in belts)
    - id: ClothingUniformJumpsuitSecGrey
      prob: 0.3
    - id: ClothingHeadHelmetBasic
    - id: ClothingOuterArmorBasic
    #- id: ClothingBeltSecurityFilled Goob, see GroupSelector below
    - id: Flash
      prob: 0.5
    - id: ClothingEyesGlassesSecurity
    # - id: ClothingHeadsetSecurity, Goob, over ear headsets
    - id: ClothingHandsGlovesColorBlack
    - id: ClothingShoesBootsJack
    - id: WeaponMeleeNeedle
      prob: 0.1
    #- id: HoloprojectorSecurity, Goobstation, it's in every belt
    #  prob: 0.6
    - id: BookSpaceLaw
      prob: 0.5
    - id: ClothingHeadsetAltSecurityRegular # Goobstation
    - id: PanicButton # Goobstation
#    - id: PepperSpray # Goobstation # Orion-Edit: Removed
    # Goobstation - Martial Arts - start
    - !type:GroupSelector
      children:
      - id: ClothingBeltSecurityFilled
        weight: 0.8 # Orion-Edit: 0.5 > 0.8
      # - id: ClothingBeltCorporateJudoFilled # RW: disable judo
      #   weight: 0.2 # Orion-Edit: 0.5 > 0.2
    # Goobstation - Martial Arts - end

