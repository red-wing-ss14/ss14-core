# As opposed to MagazineBox these are boxes of magazines so BoxMagazine
# CaselessRifle
- type: entity
  name: box of magazines
  parent: BoxCardboard
  id: BoxMagazine
  description: A box full of magazines.
  components:
  - type: Sprite
    layers:
      - state: box_security
      - state: magazine

- type: entity
  name: box of 9.5mm HP magazines # Goob edit
  parent: BoxMagazine
  id: BoxMagazinePistolCaselessRifle
  description: A box full of 9.5mm caseless magnum hollow-point magazines. # Goob edit
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: MagazinePistolCaselessRifle
        amount: 4

- type: entity
  name: box of 9.5mm (practice) magazines # Goob edit
  parent: BoxMagazine
  id: BoxMagazinePistolCaselessRiflePractice
  description: A box full of 9.5mm caseless magnum practice magazines. # Goob edit
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: MagazinePistolCaselessRiflePractice
        amount: 4

