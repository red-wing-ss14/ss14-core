- type: entity
  id: RandomVending
  name: random vending machine spawner
  suffix: Any
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Machines/VendingMachines/random.rsi
      state: any
  - type: RandomSpawner
    prototypes:
    - VendingMachineChang
    - VendingMachineCigs
    - VendingMachineCoffee
    - VendingMachineCola #Robust Sofdrinks
    - VendingMachineColaBlack #Robust Sofdrinks [Black]
    - VendingMachineColaRed #Space Cola
    - VendingMachineDiscount
    - VendingMachineDonut
    - VendingMachineDrGibb
    - VendingMachinePwrGame
    - VendingMachineShamblersJuice
    - VendingMachineSmite
    - VendingMachineSnack
    - VendingMachineSnackBlue
    - VendingMachineSnackGreen
    - VendingMachineSnackOrange
    - VendingMachineSnackTeal
    - VendingMachineSoda #Robust Sofdrinks [Soda]
    - VendingMachineSovietSoda #Boda
    - VendingMachineSpaceUp
    - VendingMachineStarkist
    - VendingMachineSweetToof # Goobstation
    # Reserve: Orchid's Barmania - Vendichaos start
    - VendingMachineFitness
    - VendingMachineHotfood
    - VendingMachineSolsnack
    - VendingMachineWeeb
    - VendingMachineCigs  # Twice for bigger chance
    - VendingMachineSoups  # Reserve
    - VendingMachineEnergyDrinks  # Reserve
    - VendingMachineBottles  # Reserve
    - VendingMachineIcedDrinks  # Reserve
    - VendingMachineCartons  # Reserve
    - VendingMachineIceCream  # Reserve
    - VendingMachineJellyDonuts  # Reserve
    # Reserve: Orchid's Barmania - Vendichaos end
    chance: 1


- type: entityTable
  id: ClothingVendorTable
  table: !type:GroupSelector
    children:
    - id: VendingMachineClothing
      weight: 40
    - id: VendingMachineWinter
      weight: 40
#    - id: VendingMachinePride # Orion-Edit: Removed
#      weight: 10
    - id: VendingMachineTheater
      weight: 10

- type: entity
  id: RandomVendingClothing
  name: random vending machine spawner
  suffix: Clothing
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Machines/VendingMachines/random.rsi
      state: clothing
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: ClothingVendorTable
