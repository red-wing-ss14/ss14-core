- type: entity
  id: RandomDrinkBottle
  name: random drink spawner
  suffix: Bottle
  parent: MarkerBase
  placement:
    mode: PlaceFree  # Reserve: Orchid's Barmania - Vendichaos
  components:
  - type: Transform  # Reserve: Orchid's Barmania - Vendichaos
    anchored: false
  - type: Sprite
    layers:
      - state: red
      - sprite: Objects/Consumable/Drinks/ginbottle.rsi
        state: icon
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomAllAlcoholTable
      prob: 0.8

- type: entityTable
  id: RandomAllAlcoholTable
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: RandomCommonAlcoholTable
      weight: 0.95
    - !type:NestedSelector
      tableId: RandomRareAlcoholTable
      weight: 0.05

- type: entityTable
  id: RandomCommonAlcoholTable
  table: !type:GroupSelector
    children:
    - id: DrinkAbsintheBottleFull
    - id: DrinkBlueCuracaoBottleFull
    - id: DrinkCognacBottleFull
    - id: DrinkGrenadineBottleFull
    - id: DrinkGinBottleFull
    - id: DrinkGildlagerBottleFull
    - id: DrinkCoffeeLiqueurBottleFull
    - id: DrinkMelonLiquorBottleFull
    - id: DrinkPatronBottleFull
    - id: DrinkRumBottleFull
    - id: DrinkSakeBottleFull
    - id: DrinkTequilaBottleFull
    - id: DrinkVermouthBottleFull
    - id: DrinkVodkaBottleFull
    - id: DrinkWhiskeyBottleFull
    - id: DrinkWineBottleFull
    - id: DrinkBeerBottleFull
    - id: DrinkBeerGrowler
    - id: DrinkAleBottleFull
    - id: DrinkAleBottleFullGrowler
    - id: DrinkChampagneBottleFull
    # Reserve: Orchid's Barmania - Vendichaos start
    - id: DrinkJuiceBluePumpkinBottleFull
    - id: DrinkJuiceMultifruitBottleFull
    - id: DrinkBlueBoomBottleFull
    - id: DrinkMangoBoomBottleFull
    - id: DrinkLemonLimeStillBottleFull
    - id: DrinkSupermaxBottleFull
    # Reserve: Orchid's Barmania - Vendichaos end

- type: entityTable
  id: RandomRareAlcoholTable
  table: !type:GroupSelector
    children:
    - id: DrinkPoisonWinebottleFull
    # Reserve: Orchid's Barmania - Vendichaos start
    - id: DrinkPoisonBoomBottleFull
    - id: DrinkJuicePumpkinBottleFull
    # Reserve: Orchid's Barmania - Vendichaos end
