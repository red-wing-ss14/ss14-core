#Basic armor vest for inheritance
- type: entity
  abstract: true
  parent: [ClothingOuterBaseMedium, AllowSuitStorageClothing, BaseSecurityContraband]
  id: ClothingOuterArmorBase
  name: armor vest
  description: A standard Type I armored vest that provides decent protection against most types of damage.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/security.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/security.rsi
    # Goob start
  - type: Armor
    coverage:
    - Chest
    - Groin
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.55
        Heat: 0.7
    # Goob end
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 2
    knockdownTimeDelta: -2
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.7
  - type: StaticPrice # Orion
    price: 0
  # RW start
  - type: Tag
    tags:
      - WhitelistChameleon
  - type: Stainable # RW
    clothingVisuals:
      outerClothing:
      - sprite: _Gabystation/Effects/blood.rsi
        state: armorblood
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: armorbloodicon
  # RW end

#Standard armor vest, allowed for security and bartenders
- type: entity
  parent: [ BaseSecurityBartenderContraband, ClothingOuterArmorBase]
  id: ClothingOuterArmorBasic
  components:
  - type: Tag
    tags:
    - CorgiWearable
    - WhitelistChameleon

#Alternate / slim basic armor vest
- type: entity
  parent: ClothingOuterArmorBasic
  id: ClothingOuterArmorBasicSlim
  name: armor vest
  suffix: slim
  description: A slim Type I armored vest that provides decent protection against most types of damage.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/security_slim.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/security_slim.rsi

- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing, BaseSecurityContraband]
  id: ClothingOuterArmorRiot
  name: riot suit
  description: A suit of semi-flexible polycarbonate body armor with heavy padding to protect against melee attacks. Perfect for fighting delinquents around the station.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/riot.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/riot.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Tail
    traumaDeductions:
      Dismemberment: 0.4
      OrganDamage: 0.4
      BoneDamage: 0.4
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.4 # Amour edit: 0.35 > 0.4
        Slash: 0.4 # Amour edit: 0.35 > 0.4
        Piercing: 0.7 # Amour edit: 0.6 > 0.7
        Heat: 0.7 # Amour edit: 0.6 > 0.7
        Caustic: 0.7 # Amour edit: 0.75 > 0.7
        Cold: 0.8 # Amour edit: missing > 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.7 # Amour edit: 0.9 > 0.7
  - type: GroupExamine
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 2.5
    knockdownTimeDelta: -2.5
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.5 # Amour edit: 0.6 > 0.5

- type: entity
  parent: ClothingOuterArmorBase
  id: ClothingOuterArmorBulletproof
  name: bulletproof vest
  description: A Type III heavy bulletproof vest that excels in protecting the wearer against traditional projectile weaponry and explosives to a minor extent.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/bulletproof.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/bulletproof.rsi
  - type: Armor
    # Goob start
    coverage:
    - Chest
    - Groin
    - Tail
    traumaDeductions:
      Dismemberment: 0.1
      OrganDamage: 0.1
      BoneDamage: 0.1
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.4 # Amour edit: 0.3 > 0.4
        Heat: 0.9 # Amour edit: 0.8 > 0.9
    # Goob end
  - type: ExplosionResistance
    damageCoefficient: 0.80

- type: entity
  parent: ClothingOuterArmorBase
  id: ClothingOuterArmorReflective
  name: reflective vest
  description: An armored vest with advanced shielding to protect against energy weapons.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/armor_reflec.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/armor_reflec.rsi
  - type: Armor
    # Goob start
    coverage:
    - Chest
    # Does not give dismemberment deduction because of reflection. yeah do with it somehow
    modifiers:
      coefficients:
        Blunt: 0.8 # Amour edit: 0.7 > 0.8
        Slash: 0.8 # Amour edit: 0.7 > 0.8
        Piercing: 0.9 # Amour edit: 0.7 > 0.9
        Heat: 0.4 # Amour edit: 0.25 > 0.4
        Radiation: 0.6 # Amour edit: missing > 0.6
        Caustic: 0.6 # Amour edit: missing > 0.6
  - type: Reflect
    reflectProb: 0.8
    # Goob end
    reflects:
    - Energy
    reflectingInHands: false

