- type: entity
  abstract: true
  parent: Clothing
  id: ClothingOuterBase
  components:
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      collection: GenericPickup
      params:
        volume: -9
  - type: EmitSoundOnDrop
    sound:
      collection: GenericDrop
      params:
        volume: -9
  - type: EmitSoundOnLand
    sound:
      collection: GenericDrop
      params:
        volume: -9
  - type: Clothing
    slots:
    - outerClothing
    equipSound:
      collection: GenericEquip
  # Goobstation edit end
  - type: Sprite
    state: icon
  - type: AllowSuitStorage # DeltaV - allow suit storage for all outer clothing, no whitelist
  # RW start
  - type: Appearance
  - type: Stainable # RW
    clothingVisuals:
      outerClothing:
      - sprite: _Gabystation/Effects/blood.rsi
        state: outerclothing
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: outerclothing
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Fiber
          Quantity: 30
      stain: # RW
        maxVol: 5
  - type: StainBlocker # RW
    slots: [INNERCLOTHING]
  # RW end

- type: entity
  abstract: true
  parent: ClothingOuterBase
  id: ClothingOuterBaseLarge
  components:
  - type: Item
    size: Huge
  - type: Clothing
    slots:
    - outerClothing
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: Tag
    tags:
      - WhitelistChameleon
  - type: Stainable # RW
    clothingVisuals:
      outerClothing:
      - sprite: _Gabystation/Effects/blood.rsi
        state: suitblood
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: suitbloodicon
  - type: StainBlocker # RW
    slots: [INNERCLOTHING, FEET, GLOVES]

- type: entity
  abstract: true
  parent: ClothingOuterBase
  id: ClothingOuterStorageBase
  components:
  - type: Storage
    grid:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: StaticPrice
    price: 40 # Orion-Edit: 70 > 40
  - type: Stainable # RW
    clothingVisuals:
      outerClothing:
      - sprite: _Gabystation/Effects/blood.rsi
        state: coatblood
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: coatbloodicon

- type: entity
  abstract: true
  parent: [ClothingOuterStorageBase, BaseFoldable]
  id: ClothingOuterStorageFoldableBase
  components:
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: fold-zip-verb
    foldVerbText: fold-unzip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: open
    foldedHeldPrefix: open
  - type: Sprite
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-open
      map: ["foldedLayer"]
      visible: false
  - type: Stainable # RW
    clothingVisuals:
      outerClothing:
      - sprite: _Gabystation/Effects/blood.rsi
        state: outerclothing
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: outerclothing

- type: entity
  abstract: true
  parent: ClothingOuterStorageFoldableBase
  id: ClothingOuterStorageFoldableBaseOpened
  suffix: opened
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: open
  - type: Item
    heldPrefix: open
  - type: Sprite
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
      visible: false
    - state: icon-open
      map: ["foldedLayer"]
      visible: true

- type: entity
  abstract: true
  parent: ClothingOuterStorageBase
  id: ClothingOuterStorageToggleableBase
  components:
  - type: ToggleableClothing # Goobstation - Modsuits change
    clothingPrototypes:
      head: ClothingHeadHatHoodWinterDefault
  - type: UserInterface
    interfaces:
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
      storagebase: !type:Container
        ents: []

- type: entity
  abstract: true
  parent: [ClothingOuterBase, GeigerCounterClothing, AllowSuitStorageClothing]
  id: ClothingOuterHardsuitBase
  name: base hardsuit
  components:
# SlotBlocker blocked until UI change
#  - type: SlotBlock
#    slots: [innerclothing, feet]
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01
    coolingCoefficient: 0.01
  - type: FireProtection # EE Plasmeme Change
    reduction: 0.75 # almost perfectly sealed, atmos firesuit is better
  - type: IgniteFromGasImmunity
    parts:
    - Chest
    - Groin
    - LeftArm
    - RightArm
    - LeftLeg
    - RightLeg
    - LeftFoot
    - RightFoot
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: HeldSpeedModifier
  - type: Item
    size: Ginormous
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    - Tail
    - Other
    traumaDeductions: # having a suit on saves your limbs
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.95
        Heat: 0.90
        Radiation: 0.25
  - type: ToggleableClothing
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
  - type: UserInterface
    interfaces:
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: GroupExamine
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
    - PlasmamanSafe # EE Plasmeme Change
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: Clothing
    clothingType: hardsuit # Amour port: WD Slim body types
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10 # the average lightbulb only does around four damage!
    slots: OUTERCLOTHING
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/backpack_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/backpack_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/backpack_drop.ogg
      params:
        volume: -4
  # Goobstation edit end
  - type: HideClothingLayerClothing # Goobstation
    hiddenSlots:
    - jumpsuit
  - type: StainBlocker # RW
    slots: [INNERCLOTHING, FEET, GLOVES]
  - type: CosmicTransmutable # DeltaV
    transmutesTo: ClothingOuterHardsuitCosmicCult
    requiredGlyphType: CosmicGlyphWarding

- type: entity
  abstract: true
  parent: [ClothingOuterBase, AllowSuitStorageClothing]
  id: ClothingOuterEVASuitBase
  name: base EVA Suit
  components:
# SlotBlocker blocked until UI change
#  - type: SlotBlock
#    slots: [innerclothing, feet]
  - type: PressureProtection
    highPressureMultiplier: 0.6
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01 # Not complete protection from fire
    coolingCoefficient: 0.01
  - type: IgniteFromGasImmunity # EE Plasmeme Change
    parts:
    - Chest
    - Groin
    - LeftArm
    - RightArm
    - LeftLeg
    - RightLeg
    - LeftFoot
    - RightFoot
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: Item
    size: Huge
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10 # the average lightbulb only does around four damage!
    slots: OUTERCLOTHING
  - type: HideClothingLayerClothing # Goobstation
    hiddenSlots:
    - jumpsuit
  - type: Tag
    tags:
    - PlasmamanSafe # EE Plasmeme Change
  - type: Clothing
    clothingType: hardsuit # Amour port: WD Slim body types
  - type: StainBlocker # RW
    slots: [INNERCLOTHING, FEET, GLOVES]
  - type: CosmicTransmutable # DeltaV
    transmutesTo: ClothingOuterHardsuitCosmicCult
    requiredGlyphType: CosmicGlyphWarding

- type: entity
  parent: ClothingOuterBase
  id: ClothingOuterBaseToggleable
  name: hoodie with hood
  abstract: True
  components:
  - type: ToggleableClothing # Goobstation - Modsuits change
    clothingPrototypes:
      head: ClothingHeadHatHoodWinterDefault
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface

- type: entity
  abstract: true
  parent: ClothingOuterBase
  id: ClothingOuterBaseMedium
  components:
  - type: Item
    size: Huge
