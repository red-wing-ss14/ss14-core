- type: entity
  abstract: true
  parent: Clothing
  id: ClothingShoesBase
  components:
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/generic_small_pickup.ogg
      params:
        volume: -5
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/shoes_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/boots_drop.ogg
      params:
        volume: -5
  - type: Clothing
    slots:
    - FEET
    equipSound:
      collection: GenericEquip
      params:
        volume: -5
  # Goobstation edit end
  # Orion-Start
  - type: SlotBlock
    blockList: [ SOCKS ]
  # Orion-End
  - type: Sprite
    state: icon
  - type: Item
    size: Normal
  - type: Edible
    requiresSpecialDigestion: true
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Fiber
          Quantity: 10
      stain: # RW
        maxVol: 5
  # RW start
  - type: TemperatureProtection
    heatingCoefficient: 1
    coolingCoefficient: 0.95
  # RW end
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon
  - type: ProtectedFromStepTriggers
  - type: Armor # provide minimal covering to your feet
    coverage:
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
  # RW start
  - type: Appearance
  - type: Stainable # RW
    clothingVisuals:
      shoes:
      - sprite: _Gabystation/Effects/blood.rsi
        state: shoeblood
    iconVisuals:
    - sprite: _Gabystation/Effects/blood.rsi
      state: shoebloodicon
  # RW end

- type: entity
  abstract: true
  parent: ClothingShoesBase
  id: ClothingShoesBaseButcherable
  components:
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 1
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 50

# stuff common to all military boots
- type: entity
  abstract: true
  parent: [ClothingShoesBase, ClothingSlotBase]
  id: ClothingShoesMilitaryBase
  components:
  - type: Matchbox
  - type: ItemSlots
    slots:
      item:
        name: clothing-boots-sidearm
        priority: 4
        whitelist:
          tags:
          - Knife
          - Sidearm
  # Goobstation
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: ModifyStandingUpTime
    multiplier: 0.5
  - type: Armor
    traumaDeductions:
      Dismemberment: 0.1
      OrganDamage: 0.1
      BoneDamage: 0.1
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9

- type: entity
  abstract: true
  id: ClothingShoesBootsSecFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - CombatKnife

- type: entity
  abstract: true
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesBaseWinterBoots
  description: Fluffy boots to help survive even the coldest of winters.
  components:
  - type: TemperatureProtection
    heatingCoefficient: 1.025
    coolingCoefficient: 0.25
