- type: entity
  name: CD case  # Reserve: CD disks fix
  parent: BaseStorageItem
  id: DiskCase
  description: Case for storing up to two disks. Or whatever you can fit in it.  # Reserve: CD disks fix
  components:
  - type: Sprite
    sprite: Objects/Misc/diskcases.rsi
    state: icon_base
  - type: Storage
    grid:
    - 0,0,0,1
    # maxItemSize: Normal  # So we can put CD cases in a CD rack  # Reserve: CD disks fix
    whitelist:
      tags:
      # Reserve: CD disks fix start
      - CD
      - Card
      - Document
      # Reserve: CD disks fix end
    storageOpenSound: /Audio/Machines/screwdriveropen.ogg
    storageCloseSound: /Audio/Machines/screwdriverclose.ogg
    storageInsertSound: /Audio/Items/crowbar.ogg
    storageRemoveSound: /Audio/Items/crowbar.ogg
  # Reserve: CD disks fix start
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - CDCase  # So we can put CD cases in a CD rack
  # Reserve: CD disks fix end
