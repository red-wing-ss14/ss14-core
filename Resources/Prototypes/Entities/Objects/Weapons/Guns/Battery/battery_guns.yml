- type: entity
  name: Svalinn # Goobstation
  parent: [BaseWeaponCustomCellSmall, BaseSecurityContraband] # goob edit - svalinn buff fix
  id: WeaponLaserSvalinn
  description: A cheap and modular laser pistol often carried by civilians. Takes standard power cells, with higher capacity ones amplifying the capacity and power of the resulting beam. # Goobstation
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/svalinn.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedOffset: 0,-7
    sprite: Objects/Weapons/Guns/Battery/svalinn.rsi
  - type: RestrictGunshotsByUserTag # Goobstation
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Tag
    tags:
    - Sidearm
    - LaserWeapon
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 500
      Gold: 125
  - type: ItemSlots # goob edit - let svalinns use potato batteries
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Removed
        startingItem: PowerCellMedium
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
            - PotatoBattery

