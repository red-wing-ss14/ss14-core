- type: entity
  name: Enforcer
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunEnforcer
  description: A premium, semi-automatic shotgun platform designed for law enforcement and counter-terrorism use. Reliable as a pump action, even in extreme conditions. Loads 7 rounds of 12 Gauge. # Goobstation
  components: # intend for Enforcer to have wider choke for semi-auto function
  - type: Sprite
    sprite: Objects/Weapons/Guns/Shotguns/enforcer.rsi
    scale: 1.2, 1.2 # Orion
  - type: Clothing
    sprite: Objects/Weapons/Guns/Shotguns/enforcer.rsi
  - type: Item
    sprite: Objects/Weapons/Guns/Shotguns/enforcer_inhands_64x.rsi
    shape: # Goobstation
    - 0,0,4,1
  - type: BallisticAmmoProvider
    capacity: 9 # Amour edit: 8 > 9; Orion
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    fireRate: 1.2 # Amour edit: 1.7 > 1.2; Goobstation
    soundGunshot: # Orion
      path: /Audio/_Orion/Weapons/Guns/Shotguns/t35.ogg

- type: entity
  parent: WeaponShotgunEnforcer
  id: WeaponShotgunEnforcerRubber
  suffix: Non-Lethal
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgunBeanbag

- type: entity
  name: Kammerer
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunKammerer
  description: An old and faithful pump action, the Kammerer is cheap, light, and would probably still function if you left it in the burn chamber for a week. Popular for civilian use, and loved by NanoTrasen for its minuscule price tag. Loads 12 Gauge rounds. # Goobstation # Orion-Edit
  components: # intend for Kammerer to have tighter choke for slower fire rate and/or manual cycling
  - type: Item
    sprite: Objects/Weapons/Guns/Shotguns/pump_inhands_64x.rsi
  - type: Sprite
    sprite: Objects/Weapons/Guns/Shotguns/pump.rsi
    scale: 1.2, 1.2 # Orion
  - type: Clothing
    sprite: Objects/Weapons/Guns/Shotguns/pump.rsi
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    fireRate: 1.2 # Amour edit: missing > 1.2
    soundGunshot: # Orion
      path: /Audio/_Orion/Weapons/Guns/Shotguns/t35.ogg
    # fireRate: 1 # goob
  - type: GunSpreadModifier
    spread: 0.6 # Amour edit: 0.65 > 0.6; Orion-Edit: 0.6 > 0.65
  - type: Tag
    tags:
    - WeaponShotgunKammerer
  - type: BallisticAmmoProvider # Goobstation
    capacity: 6 # Amour edit: missing > 6
    autoCycle: false
    soundRack: # Orion
      path: /Audio/_Orion/Weapons/Guns/Shotguns/shotgun_cmb_pump.ogg

