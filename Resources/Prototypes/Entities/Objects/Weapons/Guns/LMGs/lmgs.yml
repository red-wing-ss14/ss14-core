- type: entity
  name: BaseWeaponLightMachineGun
  parent: BaseItem
  id: BaseWeaponLightMachineGun
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: Sprite
  - type: Item
    size: Huge
    shape:
    - 0,0,4,3
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -25 # Orion-Edit: -20 > -25
  - type: Gun
    minAngle: 24
    maxAngle: 50 # Orion-Edit: 45 > 50
    angleIncrease: 2.5 # Orion-Edit: 4 > 2.5
    angleDecay: 16
    fireRate: 7.5 # Orion-Edit: 8 > 7.5
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
  - type: AmmoCounter
  - type: ItemSlots
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Localization
        startingItem: MagazineLightRifleBox
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineLightRifleBox
      gun_chamber:
#        name: Chamber # Orion-Edit: Localization
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice
    price: 500
  - type: UseDelay
    delay: 1
  - type: UseDelayBlockShoot # Orion
  - type: Multishot # Goobstation V
    missChance: 0.4 #MISS CHANCE DOESNT WORK LMAO
  - type: RestrictGunshotsByUserTag # Goobstation
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      collection: RiflesPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: RiflesDrop
  - type: EmitSoundOnLand
    sound:
      collection: RiflesDrop
  # Goobstation edit end

- type: entity
  name: L6 SAW
  id: WeaponLightMachineGunL6
  parent: [BaseWeaponLightMachineGun, BaseSyndicateContraband]
  description: Developed by the Waffle Corporation, the L6 Squad Automatic Weapon is a deadly light machine gun often used by Gorlex boarding parties. Although bulky and cumbersome, its heavy barrel and high ammo capacity make it perfect for suppressing combatants with a hail of bullets. Feeds from .30 Rifle box magazines. # Goobstation
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: RestrictGunshotsByUserTag # Goobstation
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
  - type: Appearance
  - type: StaticPrice
    price: 10000
# Orion-Start
  - type: Gun
    soundGunshot: /Audio/_Orion/Weapons/Guns/Rifles/ak47.ogg
  - type: UseDelay
    delay: 0.5
# Orion-End

- type: entity
  name: L6C ROW
  id: WeaponLightMachineGunL6C
  parent: BaseItem
  description: A cyborg-mounted weapon system based on the L6 SAW platform. Creates ammunition on the fly from an internal fabricator, which slowly self-charges. # Goobstation
  components:
    - type: Gun
      minAngle: 4
      maxAngle: 25
      angleIncrease: 3 # Orion-Edit: 4 > 2
      angleDecay: 16
      fireRate: 7.5 # Orion-Edit: 8 > 7.5
      selectedMode: FullAuto
      availableModes:
        - FullAuto
      soundGunshot:
        path: /Audio/_Orion/Weapons/Guns/Rifles/ak47.ogg # Orion-Edit: New sounds
      soundEmpty:
        path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
    - type: Sprite
      sprite: Objects/Weapons/Guns/LMGs/l6.rsi
      layers:
        - state: base
          map: [ "enum.GunVisualLayers.Base" ]
        - state: mag-3
          map: [ "enum.GunVisualLayers.Mag" ]
    - type: Item
      size: Huge
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
    - type: BallisticAmmoProvider
      whitelist:
        tags:
        - CartridgeLightRifle
      capacity: 100
      proto: CartridgeLightRifle
      cycleable: false # No synthesizing ammo for your syndicate masters.
    - type: BallisticAmmoSelfRefiller
      autoRefillRate: 4s
      affectedByEmp: true
    - type: RestrictGunshotsByUserTag # Goobstation
      doesntContain:
      - Oni
      messages:
      - oni-cannot-shoot-guns-1
      - oni-cannot-shoot-guns-2
      - oni-cannot-shoot-guns-3
    - type: AmmoCounter
