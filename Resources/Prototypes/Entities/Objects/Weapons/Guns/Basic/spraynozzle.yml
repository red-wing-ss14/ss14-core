- type: entity
  id: WeaponSprayNozzle
  parent: BaseItem
  name: spray nozzle
  description: A high-powered spray nozzle used in conjunction with a backpack-mounted water tank.
  components:
  - type: Tag
    tags:
    - SprayNozzle
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/spraynozzle.rsi
    state: icon
  - type: Item
    sprite: Objects/Weapons/Guns/Basic/spraynozzle.rsi
    size: Normal
  - type: Gun
    cameraRecoilScalar: 0 #no recoil
    fireRate: 4
    projectileSpeed: 18 # Orion
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/water_spray.ogg
  - type: Absorbent
    pickupAmount: 35
    solutionName: tank
    useAbsorberSolution: false
    pickupSound:
      path: /Audio/Effects/Fluids/vacuum-cleaner-fast.ogg
  - type: Appearance
  - type: ClothingSlotAmmoProvider
  - type: SlotBasedConnectedContainer
    targetSlot:
    - BACK
    - suitStorage #goob edit
    containerWhitelist:
      tags:
      - NozzleBackTank
  - type: UseDelay
    delay: 1.0
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 375
      Glass: 125
