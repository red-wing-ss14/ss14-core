- type: entity
  name: BaseWeaponRevolver
  parent: BaseItem
  id: BaseWeaponRevolver
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: Sprite
    state: icon
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedOffset: 0,-6
  - type: Tag
    tags:
    - Sidearm
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: AmmoCounter
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 2 # Goobstation
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/revolver.ogg
  - type: UseDelay
    delay: 0.66
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - CartridgeMagnum
        - SpeedLoaderMagnum
    proto: CartridgeMagnum
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
    soundEject:
      path: /Audio/Weapons/Guns/MagOut/revolver_magout.ogg
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
  - type: StaticPrice
    price: 500
  - type: Multishot # Goobstation V
    missChance: 0.4
    spreadMultiplier: 3
    spreadAddition: 40
  - type: EmitSoundOnPickup
    sound:
      collection: RevolversPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: RevolversDrop
  - type: RestrictGunshotsByUserTag # Goobstation
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
  - type: EmitSoundOnLand
    sound:
      collection: RevolversDrop
  # Goobstation edit end

- type: entity
  name: Deckard
  parent: [BaseWeaponRevolver, BaseSecurityCommandContraband]
  id: WeaponRevolverDeckard
  description: A beautifully machined, custom-built revolver. Used when there is no time for the Voight-Kampff test. Loads 5 rounds of .45 magnum.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Gun
    fireRate: 2.5 # Goobstation
  - type: RevolverAmmoProvider
    capacity: 5
    chambers: [ True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 1500

- type: entity
  name: Inspector
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverInspector
  description: A double-action revolver manufactured by various companies. It is readily available on the civilian market, making it a popular choice among private investigators. You feel lucky just holding it. Loads 6 rounds of .45 magnum.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: Item
    storedOffset: 0,-2
  - type: RevolverAmmoProvider
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
  - type: StealTarget
    stealGroup: WeaponRevolverInspector # Amour edit

- type: entity
  name: Mateba
  parent: [BaseWeaponRevolver, BaseCentcommContraband]
  id: WeaponRevolverMateba
  description: A rare and beautiful semi-automatic revolver. Provided only to the Nanotrasen elite, the Mateba sports a unique barrel design that greatly reduces muzzle flip. Many have stared down the barrel of this gun, and even fewer have lived to tell the tale. Loads 7 rounds of .45 Magnum. # Goobstation
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/Revolver/mateba/big.rsi # Orion-Edit: New sprites
  - type: Item # Orion
    sprite: _Orion/Objects/Weapons/Guns/Revolver/mateba/tiny.rsi
    storedOffset: 0,-3
  - type: Clothing
    sprite: _Orion/Objects/Weapons/Guns/Revolver/mateba/tiny.rsi # Orion-Edit: New sprites
  - type: Gun
    fireRate: 3 # Orion-Edit
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/Revolvers/mateba.ogg # Orion-Edit
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - CartridgeMagnum
        - SpeedLoaderMagnum
    proto: CartridgeMagnumAP # Goobstation - Deathsquad revamp
    capacity: 7 # Goobstation - Deathsquad revamp
    chambers: [ True, True, True, True, True, True, True ] # Goobstation - Deathsquad revamp
    ammoSlots: [ null, null, null, null, null, null, null ] # Goobstation - Deathsquad revamp
    soundEject:
      path: /Audio/_Orion/Weapons/Guns/Revolvers/revolver_unload.ogg # Orion-Edit
    soundInsert:
      path: /Audio/_Orion/Weapons/Guns/Revolvers/revolver_load.ogg # Orion-Edit

- type: entity
  parent: WeaponRevolverMateba
  id: WeaponRevolverMatebaAP # For deathsquad
  suffix: armor-piercing
  components:
  - type: RevolverAmmoProvider
    proto: CartridgeMagnumAP

- type: entity
  name: Python
  parent: [BaseWeaponRevolver, BaseSyndicateContraband]
  id: WeaponRevolverPython
  description: A powerful double-action revolver designed by the Waffle Corporation. Loud and flashy, and perfect for any agent looking to make a statement. Loads 6 rounds of .45 magnum. # Goobstation
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Item
    storedOffset: 0,-2
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 2.5 # Goobstation
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/revolver.ogg
      params:
        volume: 2.25
  - type: StaticPrice
    price: 1500 # Botany can shit these out like candy, but let's see how it goes

- type: entity
  parent: WeaponRevolverPython
  id: WeaponRevolverPythonAP # For the uplink.
  suffix: armor-piercing
  components:
  - type: RevolverAmmoProvider
    proto: CartridgeMagnumAP


