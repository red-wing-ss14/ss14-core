- type: entity
  parent: [ BaseItem, BaseSecurityContraband ]
  id: SpeedLoaderLightRifle
  name: "speed loader (7.62mm rifle)" # Orion-Edit: .30 > 7.62mm
  description: 5-round 'stripper clip' for quickly reloading the Kardashev-Mosin. Holds 5 rounds of .30 rifle.
  components:
  - type: Tag
    tags:
      - SpeedLoaderRifle
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    fillDelay: 0.1 # Orion
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRifle762 # Orion-Edit
    capacity: 10 # Orion-Edit: 5 > 10
    proto: CartridgeRifle762 # Orion-Eidt
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/SpeedLoaders/LightRifle/light_rifle_speed_loader.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-5
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []