- type: entity
  abstract: true
  parent: [ BaseCartridge, BaseSecurityContraband ]
  id: BaseCartridgeRifle
  name: cartridge (5.56mm rifle) # Orion-Edit: .20 > 5.56mm
  parent: [ BaseCartridge, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
      - CartridgeRifle
  - type: CartridgeAmmo
    proto: BulletRifle
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi # Orion-Edit: New sprites
    scale: 0.8, 0.8 # Orion
    layers:
    - state: 20combat # Orion-Edit: New sprites
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: 20combat # Orion: New sprites

- type: entity
  parent: BaseCartridgeRifle
  id: CartridgeRifle
  name: cartridge (5.56mm rifle) # Orion-Edit: .20 > 5.56mm
  parent: BaseCartridgeRifle
  description: A modern intermediate cartridge for combat rifles. Standard kinetic ammunition is common and useful in most situations.
  components:
  - type: CartridgeAmmo
    proto: BulletRifle

