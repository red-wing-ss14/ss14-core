- type: entity
  parent: BaseItem
  id: WeaponMeleeToolboxRobust
  name: robust toolbox
  description: A tider's weapon.
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Orion/Objects/Tools/Toolboxes/toolbox_robust.rsi # Orion-Edit
    state: icon
  - type: Item
    size: Ginormous
    sprite: _Orion/Objects/Tools/Toolboxes/toolbox_robust.rsi # Orion-Edit
  # Orion-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/toolbox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/toolbox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/toolbox_drop.ogg
  # Orion-End
  - type: MeleeWeapon
#    wideAnimationRotation: -135 # Orion-Edit: Removed
    attackRate: 1.5
    damage:
      types:
        Blunt: 20
    soundHit:
      path: "/Audio/Weapons/smash.ogg"