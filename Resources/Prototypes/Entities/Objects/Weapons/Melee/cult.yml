- type: entity
  name: ritual dagger
  parent: BaseKnife # RW BaseItem > BaseKnife
  id: RitualDagger
  description: A strange dagger used by sinister groups for rituals and sacrifices.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_dagger.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    heavyStaminaCost: 5
    attackRate: 1.5
    damage:
      types:
        Piercing: 15 # RW Slash: 12 > Piercing: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  # RW start - make dagger a rune-drawing cult weapon
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 15
  - type: EmbeddableProjectile
  - type: ThrowingAngle
    angle: 225
  - type: CultItem
  - type: RuneDrawer
  - type: ActivatableUI
    key: enum.RuneDrawerBuiKey.Key
    inHandsOnly: true
  - type: UserInterface
    interfaces:
      enum.RuneDrawerBuiKey.Key:
        type: RuneDrawerBUI
  # RW end

- type: entity
  name: eldritch blade
  parent: BaseItem
  id: EldritchBlade
  description: A sword humming with unholy energy.
  components:
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_blade.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.75
    damage:
      types:
        Slash: 16
    soundHit: # Goobstation
        path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_blade.rsi
    slots:
    - back
  - type: DisarmMalus

- type: entity
  name: unholy halberd
  parent: BaseItem
  id: UnholyHalberd
  description: A poleaxe that seems to be linked to its wielder.
  components:
  - type: Tag
    tags:
    - FireAxe
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_halberd.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.75
    damage:
      types:
        Blunt: 10
        Slash: 10
        Structural: 5
    soundHit:
      collection: MetalThud
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Slash: 5
        Structural: 10
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_halberd.rsi
    quickEquip: false
    slots:
    - back
  - type: UseDelay
    delay: 1