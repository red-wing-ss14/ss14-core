- type: entity
  parent: BaseItem
  id: BaseHealingItem
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medical.rsi
  - type: Item
    size: Small
    sprite: Objects/Specific/Medical/medical.rsi
    heldPrefix: ointment
  # Inherited
  - type: StaticPrice
    price: 0

- type: entity
  name: ointment
  description: Used to treat those nasty burns. Less effective on caustic burns.
  parent: BaseHealingItem
  id: Ointment
  suffix: Full
  components:
  - type: Tag
    tags:
    - Ointment
  - type: Sprite
    state: ointment
  - type: Item
    heldPrefix: ointment
    storedRotation: 45
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        # Amour edit: removed Shock -5, Caustic -1.5 > -2
        Heat: -5
        Cold: -5
        Caustic: -2
    delay: 4 # Amour edit
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Ointment
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 5

- type: entity
  id: Ointment1
  parent: Ointment
  suffix: Single
  components:
  - type: Stack
    stackType: Ointment
    count: 1

- type: entity
  name: regenerative mesh
  description: Used to treat even the nastiest burns. Also effective against caustic burns.
  parent: BaseHealingItem
  id: RegenerativeMesh
  suffix: Full
  components:
  - type: Tag
    tags:
    - Ointment
  - type: Sprite
    state: regenerative-mesh
  - type: Item
    heldPrefix: regenerative-mesh
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        # Amour edit: removed Shock -10, Caustic -10 > -5
        Heat: -10
        Cold: -10
        Caustic: -5
    delay: 4 # Amour edit
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: RegenerativeMesh
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 20

- type: entity
  id: OintmentAdvanced1
  parent: RegenerativeMesh
  suffix: Single
  components:
  - type: Stack
    stackType: RegenerativeMesh
    count: 1

- type: entity
  name: bruise pack
  description: A therapeutic gel pack and bandages designed to treat blunt-force trauma.
  parent: BaseHealingItem
  id: Brutepack
  suffix: Full
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    state: brutepack
  - type: Item
    heldPrefix: brutepack
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types: # Amour edit: Brute -15 > split damage
        Blunt: -5
        Slash: -5
        Piercing: -5
    delay: 4 # Amour edit
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Brutepack
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 5

- type: entity
  id: Brutepack1
  parent: Brutepack
  suffix: Single
  components:
  - type: Stack
    stackType: Brutepack
    count: 1

- type: entity
  name: medicated suture
  description: A suture soaked in medicine, treats blunt-force trauma effectively and closes wounds.
  parent: BaseHealingItem
  id: MedicatedSuture
  suffix: Full
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    state: medicated-suture
  - type: Item
    heldPrefix: medicated-suture
    storedRotation: -90
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types: # Amour edit: Brute -20 > split damage
        Blunt: -5
        Slash: -7
        Piercing: -10
    bloodlossModifier: -10 # a suture should stop ongoing bleeding
    delay: 4 # Amour edit
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: MedicatedSuture
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 20
  # <Shitmed>
  - type: Stitches
    speed: 2 # actual stitches cost nothing to use so these are faster, shits expensive
    used: true
  - type: SurgeryTool
    startSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    endSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  # </Shitmed>

- type: entity
  id: BrutepackAdvanced1
  parent: MedicatedSuture
  suffix: Single
  components:
  - type: Stack
    stackType: MedicatedSuture
    count: 1

- type: entity
  name: blood pack
  description: Contains a groundbreaking universal blood replacement created by Nanotrasen's advanced medical science.
  parent: BaseHealingItem
  id: Bloodpack
  suffix: Full
  components:
  - type: Item
    heldPrefix: bloodpack
  - type: Tag
    tags:
    - Bloodpack
  - type: Sprite
    state: bloodpack
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Bloodloss: -0.5 # Amour edit: returned
    modifyBloodLevel: -15 # Amour edit: returned
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Bloodpack
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 10

- type: entity
  parent: Bloodpack
  id: Bloodpack1
  suffix: Single
  components:
  - type: Stack
    stackType: Bloodpack
    count: 1

# Shitmed Change - yeah this thing is effectively an entirely different tool now.
- type: entity
  parent: BaseHealingItem
  id: Tourniquet
  name: tourniquet
  description: Stops bleeding! Hopefully.
  components:
    - type: Item
      heldPrefix: tourniquet
    - type: Tourniquet
      blockedBodyParts:
      - Head
      - Chest
      - Groin
      putOnSound:
        path: "/Audio/Items/Medical/brutepack_begin.ogg"
      putOffSound:
        path: "/Audio/Items/Medical/brutepack_end.ogg"
    - type: Tag
      tags:
        - SecBeltEquip
        - Tourniquet
    - type: Sprite
      state: tourniquet

- type: entity
  name: roll of gauze
  description: Some sterile gauze to wrap around bloody stumps.
  parent: BaseHealingItem
  id: Gauze
  suffix: Full
  components:
  - type: Tag
    tags:
    - Gauze
  - type: Sprite
    state: gauze
  - type: Clothing # Orion
    sprite: _Orion/Clothing/Hands/Gloves/gauze.rsi
    slots: gloves
  - type: Item
    heldPrefix: gauze
    storedRotation: -90
  - type: Construction
    graph: Gauze
    node: gauze
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Slash: -2 # Amour edit: -5 > -2
        Piercing: -2 # Amour edit: -10 > -2
    bloodlossModifier: -10
    delay: 1 # Amour edit
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Gauze
    count: 10 # Amour edit: returned
  - type: StackPrice
    price: 10

- type: entity
  id: Gauze1
  parent: Gauze
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  name: aloe cream
  description: A topical cream for burns.
  parent: Ointment ##Yes it's a direct reskin
  id: AloeCream
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/aloe.rsi
    state: cream
  - type: Stack
    stackType: AloeCream
    count: 10 # Amour edit: returned

- type: entity
  parent: BaseHealingItem
  id: HealingToolbox
  name: healing toolbox
  description: A powerful toolbox imbued with robust energy. It can heal your wounds and fill you with murderous intent.
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/healing_toolbox.rsi
    state: icon
  - type: Healing
    damageContainers:
    - Biological
    damage:
      groups: # these are all split across multiple types
        Brute: -150
        Burn: -150
        Toxin: -150
    bloodlossModifier: -20
    delay: 1
    selfHealPenaltyMultiplier: 0
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125

