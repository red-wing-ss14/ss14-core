- type: entity
  name: handheld crew monitor
#  categories: [ DoNotMap ] # Goobstation
  parent: [ BaseHandheldComputer, BaseMedicalContraband ] # Goobstation
  # CMO-only bud, don't add more. # Goobstation - no lmao
  id: HandheldCrewMonitor
  description: A hand-held crew monitor displaying the status of suit sensors.
  components:
  - type: Item
    heldPrefix: scanner
  - type: Sprite
    sprite: Objects/Specific/Medical/handheldcrewmonitor.rsi
    # Orion-Edit-Start
    layers:
    - state: scanner
    - state: scanner-light
      map: ["light"]
      shader: unshaded
      visible: false
    # Orion-Edit-End
  # Orion-Start
  - type: GenericVisualizer # Orion
    visuals:
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  # Orion-End
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 500
  - type: Tag
    tags:
    - HandheldCrewMonitor # Goobstation - start
    # - HighRiskItem
  # - type: StealTarget
  #   stealGroup: HandheldCrewMonitor # Goobstation - end

- type: entity
  id: HandheldCrewMonitorEmpty
  parent: HandheldCrewMonitor
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
