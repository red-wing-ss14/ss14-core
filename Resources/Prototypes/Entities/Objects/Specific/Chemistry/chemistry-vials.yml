# TODO: Have a seperate lid state that can be popped on and off (not as a seperate item) that changes whether the vial can be spilled or not.

- type: entity
  abstract: true
  parent: [ DrinkBaseMaterialGlass, DrinkBase, DrinkBaseOpenable, DrinkBaseEmptyTrash, DrinkVisualsAll ]
  id: BaseChemistryVial
  components:
  - type: Item
    size: Tiny
  - type: Openable
    sound:
      collection: bottleCloseSounds # using closed here for the quieter sound
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: FitsInDispenser
    solution: drink
  - type: ExaminableSolution
    exactVolume: true # It's a chemistry tool
  - type: Tag
    tags:
    - Trash
    - CentrifugeCompatible # unique feature of vials
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Glass: 25
  - type: ThrowableBlocked # Goobstation
    behavior: Damage
    damage:
      types:
        Blunt: 15
  - type: HeatTint # Goob - color liquid by temperature
    colorGradient:
    - temperature: 200
      color: "#A0BCE0"
    - temperature: 293
      color: "#FFFFFF"
    - temperature: 350
      color: "#FFC0A8"
    - temperature: 800
      color: "#FF9880"
    affectedLayers:
    - "enum.SolutionContainerLayers.Fill"
  - type: DrawableSolution #Goob
    solution: beaker
  - type: SolutionContainerVisuals #goob
    maxFillLevels: 6
    inHandsMaxFillLevels: 4
    fillBaseName: fill-
    inHandsFillBaseName: -fill-
    solutionName: beaker
  - type: SolutionContainerManager #goob
    solutions:
      beaker:
        maxVol: 30

## Entities

- type: entity
  parent: BaseChemistryVial
  id: ChemistryEmptyVial
  name: vial
  description: A small vial.
  components:
  - type: Item
    sprite: Objects/Specific/Chemistry/vial.rsi
  - type: Sprite
    sprite: Objects/Specific/Chemistry/vial.rsi
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    inHandsMaxFillLevels: 4
  - type: SolutionTransfer
    maxTransferAmount: 30
  - type: StaticPrice
    price: 100
  - type: Destructible
    thresholds:
    - trigger: &DamageTrigger100
        !type:DamageTrigger
        damage: 100
      behaviors: &OverkillBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15 # stronger than base
      behaviors:
      - &SoundGlassBreak !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass: # less glass than base
            min: 0
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: BaseChemistryVial
  id: ChemistryEmptyVialSmall
  name: mini vial
  description: A smaller vial.
  components:
  - type: Item
    sprite: Objects/Specific/Chemistry/vial_mini.rsi
  - type: Sprite
    sprite: Objects/Specific/Chemistry/vial_mini.rsi
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    inHandsMaxFillLevels: 4
  - type: SolutionContainerManager
    solutions:
      beaker: #Goob
        maxVol: 10
  - type: SolutionTransfer
    maxTransferAmount: 10
  - type: StaticPrice
    price: 50
  - type: PhysicalComposition
    materialComposition:
      Glass: 10
  - type: Destructible
    thresholds:
    - trigger: *DamageTrigger100
      behaviors: *OverkillBehavior
    - trigger:
        !type:DamageTrigger
        damage: 5 # smaller so weaker
      behaviors: # remove glass shard spawn
      - *SoundGlassBreak
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

## Reagent filled

- type: entity
  parent: ChemistryEmptyVial
  id: VestineChemistryVial
  suffix: vestine
  components:
  - type: Label
    currentLabel: reagent-name-vestine
  - type: SolutionContainerManager
    solutions:
      beaker: #Goob
        maxVol: 30
        reagents:
        - ReagentId: Vestine
          Quantity: 30
  - type: Tag
    tags: &TagVial # Remove trash tag when we have a filled solution
    - CentrifugeCompatible

