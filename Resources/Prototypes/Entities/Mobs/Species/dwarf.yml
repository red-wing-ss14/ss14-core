- type: entity
  save: false
  name: Urist McHands The Dwarf
  parent: BaseMobSpeciesOrganic
  id: BaseMobDwarf
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2
    damageRecovery:
      types:
        Asphyxiation: -1.0
#  Goob disabled due to h/w slider probably. # Goobstation: port EE height/width sliders (below is not needed with height/width sliders implemented)
#  - type: ScaleVisuals
#    scale: 1, 0.8
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35 # Goobstation: port EE height/width sliders (previous value was lower (also a goobstation change), but the height/width sliders will lower this size automatically)
        density: 240 # goob edit - but they r buff
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Body
    prototype: Dwarf
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Vocal
    sounds:
      Male: UnisexDwarf
      Female: FemaleDwarf
      Unsexed: UnisexDwarf
  - type: ReplacementAccent
    accent: dwarf
  - type: ZombieAccentOverride #Goob
    accent: zombieDwarf #Goob
  - type: Speech
    speechSounds: Bass
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    - SolCommon
    understands:
    - TauCetiBasic
    - SolCommon
  - type: HumanoidAppearance
    species: Dwarf
    hideLayersOnEquip:
    - Hair
    - Snout
    markingsDisplacement:
      Chest: &dwarfismDisp
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: dwarfism
      Head: *dwarfismDisp
      LArm: *dwarfismDisp
      RArm: *dwarfismDisp
      LHand:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: dwarfism_hand_left
      RHand:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: dwarfism_hand_right
      LLeg: *dwarfismDisp
      RLeg: *dwarfismDisp
      LFoot: *dwarfismDisp
      RFoot: *dwarfismDisp
      Tail: *dwarfismDisp
      Special: *dwarfismDisp
      Hair: *dwarfismDisp
      FacialHair: *dwarfismDisp
      Snout: *dwarfismDisp
      HeadSide: *dwarfismDisp
      HeadTop: *dwarfismDisp
      Eyes: *dwarfismDisp
      Wings: *dwarfismDisp
      Face: *dwarfismDisp
      Groin: *dwarfismDisp
  - type: CreamPied
    displacement: Dwarfism
  - type: Damageable
    displacement: Dwarfism
  - type: Flammable
    displacement: Dwarfism
  - type: InnerBodyAnomalyVisuals
    displacement: Dwarfism
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Human/displacement.rsi
          state: dwarfism_hand_left
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Human/displacement.rsi
          state: dwarfism_hand_right
  - type: Inventory
    femaleDisplacements: { }
    displacements:
      jumpsuit: *dwarfismDisp
      outerClothing: *dwarfismDisp
      suitstorage: *dwarfismDisp
      id: *dwarfismDisp
      mask: *dwarfismDisp
      belt: *dwarfismDisp
      eyes: *dwarfismDisp
      gloves: *dwarfismDisp
      head: *dwarfismDisp
      neck: *dwarfismDisp
      back: *dwarfismDisp
      ears: *dwarfismDisp
      shoes: *dwarfismDisp
      underwear: *dwarfismDisp
      undershirt: *dwarfismDisp
      socks: *dwarfismDisp
  - type: InnateMiningScannerViewer # Frontier
    pingSound: null
    viewRange: 3 # Goob value

