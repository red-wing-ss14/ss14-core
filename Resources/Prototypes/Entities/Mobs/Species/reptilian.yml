- type: entity
  save: false
  name: Urisst' Mzhand
  parent: BaseMobSpeciesOrganic
  id: BaseMobReptilian
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Reptilian
    hideLayersOnEquip:
    - Snout
#    - HeadTop # WWDP - Because visible horns its cool
    - HeadSide
    undergarmentBottom: UndergarmentBottomBoxersReptilian
  - type: Hunger
  - type: Puller
    needsHands: false
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Reptilian/parts.rsi
    state: full
  - type: Body
    prototype: Reptilian
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatLizard
      amount: 5
  - type: LizardAccent
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: TypingIndicator
    proto: lizard
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    - Draconic
    understands:
    - TauCetiBasic
    - Draconic
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Scale
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 400
    coldDamageThreshold: 285
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.0 # Goob edit #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      301: 0.9
      295: 0.8
      285: 0.7
  - type: Wagging
  - type: Inventory
    speciesId: reptilian
    # WWDP-Edit-Start
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit-female
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      # Amour-Start
      jumpsuit-body-digitigrade:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit-female-digi
      shoes-body-digitigrade:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: shoes-digi
      # Amour-End
      # Orion-Start
      underwear:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      socks:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      # Orion-End
      # Amour-Start
      jumpsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit-female-slim
      shoes-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: shoes-slim
      gloves-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: gloves
      outerClothing-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: outer
      hardsuit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: hardsuit
      suit-body-slim:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Human/displacement.rsi
            state: suit
      # Amour-End
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      # Amour-Start
      jumpsuit-body-digitigrade:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit-digi
      shoes-body-digitigrade:
        sizeMaps:
          32:
            sprite: _Amour/Mobs/Species/Reptilian/displacement.rsi
            state: shoes-digi
      # Amour-End
      # Orion-Start
      underwear:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      socks:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      # Orion-End
    # WWDP-Edit-End
  - type: Consciousness # Idk they are kinda more resistant to pain
    threshold: 105
    cap: 210
  # Goobstation
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - ReptilianEmotes

