- type: entity
  id: SolidSecretDoor
  name: solid wall
  parent: BaseSecretDoor
  components:
  - type: Construction
    graph: Girder # Orion-Edit: Better construction
    node: solidSecretDoor
#    containers: # Orion-Edit: Remove container
#    - battery-container
  - type: CosmicCorruptible # DeltaV - Cosmic Cult
    convertTo: DoorCosmicCult
