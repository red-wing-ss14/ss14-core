- type: entity
  id: WebDoor
  name: web door
  parent: BaseMaterialDoorNavMap
  description: A door, leading to the lands of the spiders... or a spaced room.
  components:
  - type: Sprite
    sprite: Structures/Doors/web_door.rsi
  - type: Construction
    graph: WebStructures
    node: door
  - type: Destructible
    thresholds:
    - trigger: # Excess damage, don't spawn entities
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWebSilk:
            min: 3
            max: 5
  - type: Damageable
    damageModifierSet: Web
  - type: Door
    closeSound:
      path: /Audio/Effects/rustle1.ogg
    openSound:
      path: /Audio/Effects/rustle2.ogg

- type: entity
  id: CardDoor
  parent: BaseMaterialDoorNavMap
  name: cardboard door
  components:
  - type: Sprite
    sprite: Structures/Doors/MineralDoors/card_door.rsi
  - type: Door
    openSound:
      path: /Audio/Effects/card_drag.ogg
    closeSound:
      path: /Audio/Effects/card_drag.ogg
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/pierce.ogg"
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Card
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCardboard:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: DoorGraph
    node: cardDoor

- type: entity
  parent: BaseMaterialDoorNavMap
  id: IronstoneDoor
  name: ironstone door
  description: A mysterious door made of rune-etched stone.
  components:
  - type: Sprite
    sprite: Structures/Doors/MineralDoors/ironstone_door.rsi
  - type: Door
    openSound:
      path: /Audio/Effects/stonedoor_openclose.ogg
    closeSound:
      path: /Audio/Effects/stonedoor_openclose.ogg
  - type: RCDDeconstructable
    deconstructable: false
  - type: Damageable
    damageModifierSet: Rock
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 250 # A pickaxe can destroy this in two hits, since the door is rock.
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SteelOre1:
            min: 0
            max: 1

- type: entity
  parent: IronstoneDoor
  id: EncrustedIronstoneDoor
  name: encrusted ironstone door
  description: A stone door covered in nacreous blobs of an unknown substance.
  components:
  - type: Sprite
    sprite: Structures/Doors/MineralDoors/encrusted_ironstone_door.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 375
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            path: /Audio/Effects/break_stone.ogg
            params:
              volume: -6
        - !type:SpawnEntitiesBehavior
          spawn:
            SteelOre1:
              min: 0
              max: 1