- type: entity
  parent: BaseItem
  id: BaseAnomalyCore
  abstract: true
  name: anomaly core
  description: The core of a destroyed incomprehensible object.
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/gravity_core.rsi
    noRot: true
    layers:
    - state: core
    - state: pulse
      map: ["decay"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AnomalyCoreVisuals.Decaying:
        decay:
          True: { visible: true }
          False: { visible: false }
  - type: Item
    size: Tiny
  - type: EmitSoundOnUse #placeholder for future unical mechanic
    sound:
      collection: RadiationPulse
  - type: UseDelay
    delay: 2
  - type: Tag
    tags:
    - ForceableFollow
    - AnomalyCore # Orion
  - type: AnomalyCore
    timeToDecay: 600
    startPrice: 10000
    endPrice: 200
    # Orion-Start
    reactivationReagentAmount: 5
    reactivationReagents:
    - Bluespace
    hazardousReactivationReagents:
    - Plasma
    - UnstableMutagen
    hazardousFailureChance: 0.65
    # Orion-End
  # Orion-Start
  - type: SolutionContainerManager
    solutions:
      reactivation:
        maxVol: 5
  - type: RefillableSolution
    solution: reactivation
  - type: InjectableSolution
    solution: reactivation
  # Orion-End
  - type: MovedByPressure #Goob - space wind moment
    enabled: false
  # Orion-Start
  - type: ResearchAnalyzable
    supportedMethods:
    - Deconstruct
    methodPointRewards:
      Deconstruct:
      - type: General
        amount: 900
      - type: Experimental
        amount: 500
    discoveryTrigger: machine:anomaly-core
    experimentActions:
    - analyze_anomaly_core
  # Orion-End

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCorePyroclastic
  name: pyroclastic anomaly core # Goobstation - anomaly core names
  suffix: Pyroclastic
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/pyro_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 2.7
    color: "#E25822"
    castShadows: false
  - type: IgnitionSource
    temperature: 400
    ignited: true
  - type: Enchanter # Goobstation
    maxLevel: 2 # Non-inert cores can roll max level
    enchants:
    - EnchantFireAspect
    - EnchantLavaforged

