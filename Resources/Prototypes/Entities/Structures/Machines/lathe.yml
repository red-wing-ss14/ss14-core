- type: entity
  id: Autolathe
  parent: [BaseLatheLube]
  name: autolathe
  description: It produces basic items using metal and glass. Has the ability to process blueprints to print new recipes.
  components:
  - type: Sprite
    sprite: Structures/Machines/autolathe.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: AutolatheMachineCircuitboard
  - type: MaterialStorage
    whitelist: &StandardMaterialWhitelist
      tags:
        - Sheet
        - RawMaterial
        - Ingot
        # <Goobstation>
        - Metal
        - Wooden
        - SheetPlasma
        - Plastic
        # </Goobstation
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    dynamicPacks: # Orion-Edit: Static > Dynamic
    - ToolsStatic
    - PartsStatic
    - AtmosStatic
    - CablesStatic
    - PaperworkStatic
    - TowelsStatic
    #- CargoStatic Goob edit - Moved to Cargo fab
    - MaterialsStatic
    - BasicChemistryStatic
    - RollerBedsStatic
    - LightsStatic
    - ServiceStatic
    - PowerCellsStatic
    - ElectronicsStatic
    # Goobstation
    - NailsStatic
    - LatheMiscStatic
    - MedicalVehiclesStatic
    - GrenadeTriggersStatic
    - TapeRecorderStatic
    - MiscSignallersStatic
  - type: EmagLatheRecipes
    emagStaticPacks:
    - SecurityWeaponsStatic
    - SecurityAmmoStatic
    - SyndicateAmmoStatic
    # Goobstation
    - SecurityWeaponsStaticGoob
    - SecurityAmmoStaticGoob
    - SyndicateAmmoLightStatic
    - ScienceExplosives
  - type: BlueprintReceiver
    whitelist:
      tags:
      - BlueprintAutolathe
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      blueprint: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - blueprint

