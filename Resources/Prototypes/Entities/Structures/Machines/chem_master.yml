- type: entity
  id: ChemMaster
  parent: [ BaseMachinePowered, ConstructibleMachine, BaseAutomatedMachine ] # Goob: Automation
  name: ChemMaster 4000
  description: An industrial grade chemical manipulator with pill and bottle production included.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Orion/Structures/Machines/mixer.rsi # Orion-Edit
    snapCardinals: true
    layers:
    - state: mixer_empty
    - state: mixer_screens
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false # Orion-Edit: Added for power-based visibility
    # Orion-Start
    - state: mixer_screens_loaded
      shader: unshaded
      map: ["mixer_screens_loaded"]
      visible: false
    - state: mixer_empty_screen
      map: ["mixer_empty_screen"]
      visible: true
    # Orion-End
  - type: Icon
    sprite: _Orion/Structures/Machines/mixer.rsi # Orion-Edit
    state: mixer_empty
  - type: ItemMapper
    sprite: _Orion/Structures/Machines/mixer.rsi # Orion
    containerWhitelist: [beakerSlot]
    mapLayers:
      mixer_loaded:
        whitelist:
          components:
          - FitsInDispenser
  # Orion-Start
      mixer_screens_loaded:
        whitelist:
          components:
          - FitsInDispenser
  # Orion-End
  - type: ChemMaster
    pillDosageLimit: 20
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ActivatableUI
    key: enum.ChemMasterUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.ChemMasterUiKey.Key:
        type: ChemMasterBoundUserInterface
  - type: ApcPowerReceiver
    powerLoad: 250
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
        mixer_empty_screen: # Orion
          True: { visible: false }
          False: { visible: true }
  - type: WiresPanel
  - type: Machine
    board: ChemMasterMachineCircuitboard
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot
      outputSlot: !type:ContainerSlot
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
      outputSlot:
        whitelistFailPopup: chem-master-component-cannot-put-entity-message
        whitelist:
          tags:
          - Bottle
          - PillCanister
          - MedicalPatch # Goobstation
  - type: AutomationSlots # Goobstation
    slots:
    - !type:AutomatedSolution
      input: PlumbingInput
      output: PlumbingOutput
      solutionName: buffer
    - !type:AutomatedItemSlot
      input: AutomationSlotBeaker
      output: AutomationSlotBeaker
      slotId: beakerSlot
    - !type:AutomatedItemSlot # not very useful because you can't tell it to make pills
      input: AutomationSlotBottles
      output: AutomationSlotBottles
      slotId: outputSlot
    - !type:AutomatedBeakerSlot
      input: PlumbingDispenser
      output: PlumbingDispenser
  - type: SolutionContainerManager
    solutions:
      buffer: # Goobstation - solution shitcode doesnt like max volume 0 and i dont want to rewrite AddSolution
        maxVol: 1000000
  - type: DumpableSolution
    solution: buffer
    unlimited: true
  - type: GuideHelp
    guides:
    - Chemicals
    - Chemist
