- type: species
  id: Yowie
  name: species-name-yowie
  roundStart: true
  prototype: MobYowie
# Amour port: WD Slim body types START
  bodyTypes:
  - YowieNormal
# Amour port: WD Slim body types START
  markingLimits: MobYowieMarkingLimits
  dollPrototype: MobYowieDummy
  skinColoration: TintedHues
  defaultSkinTone: "#7d7d7d" # added here to make skin-tone markings work better
  naming: First
  maleFirstNames: NamesYowieMale
  femaleFirstNames: NamesYowieFemale
  # Orion-Start
  category: Unusual
  description: "/ServerInfo/_Orion/SpeciesDescriptions/Yowie.xml"
  pros:
  - Получают на 100% меньше урона от ядов.
  - Получают на 30% меньше урона от радиации.
  - Получают на 25% меньше урона от тупого, режущего и колющего.
  - Получают на 10% меньше урона от кровопотери и холода.
  - Не получают урон ядом, от не правильных операций.
  - Наносят в 2 раза больше урона голыми руками, чем человек.
  - Могут использовать двуручное оружие - одной рукой.
  special:
  - Не могут быть подняты на руки.
  cons:
  - Не могут свободно носить верхнюю одежду.
  # Orion-End
  # begin Goobstation: port EE height/width sliders
  # yowie were like. 1.3x scale before, which is comical
  minHeight: 1.10
  defaultHeight: 1.4
  maxHeight: 1.3
  minWidth: 1.15
  defaultWidth: 1.3
  maxWidth: 1.35
  # end Goobstation: port EE height/width sliders

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
# Amour port: WD Slim body types START
- type: bodyType
  id: YowieNormal
  name: body-normal
# Amour port: WD Slim body types END
  sprites:
