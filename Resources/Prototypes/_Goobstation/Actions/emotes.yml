- type: emote
  id: Flip
  name: chat-emote-name-flip
  icon: _Goobstation/Interface/Emotes/flip.png
  chatMessages: ["chat-emote-msg-flip"]
  chatTriggers:
  - flip
  - flips
  - flips.
  - flips!
  - does a flip
  - does a flip.
  - does a flip!
  # Orion-Start
  - сальто
  - сальто.
  - сальто!
  - делает сальто
  - делает сальто.
  - делает сальто!
  - кувыркается
  - кувыркается.
  - кувыркается!
  # Orion-End
  event: !type:AnimationFlipEmoteEvent

