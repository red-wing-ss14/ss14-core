- type: entity
  parent:
    - SimpleSpaceMobBase
    - MobPolymorphable
  id: BaseMobSlaughterDemon
  name: slaughter demon
  description: A large, menacing creature covered in armored black scales. You should run.
  components:
  - type: Sprite
    sprite: _Goobstation/SlaughterDemon/demon.rsi
    state: daemon
  - type: Stamina
    baseCritThreshold: 150
  - type: NightVision
    color: "#AA4A44"
    activateSound: null
    deactivateSound: null
  - type: Insulated
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: SlaughterDemon
  - type: StatusEffects # Overwriting basesimplemob to remove flash
    allowed:
    - SlowedDown
    - Stutter
    - Electrocution
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - RadiationProtection
    - Drowsiness
    - Adrenaline
  - type: MobMover
  - type: InputMover
  - type: Input
    context: "human"
  - type: InteractionOutline
  - type: NoSlip
  - type: Clickable
  - type: Butcherable
    butcherDelay: 15
    spawned: [ ]
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-slaughter-demon-name
    description: ghost-role-information-slaughter-demon-description
    rules: ghost-role-information-slaughter-demon-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonistGoob
    raffle:
      settings: default
    requirements:
      - !type:DiscordLinkRequirement # Amour edit
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/sadtrombone.ogg

# laughter demon
- type: entity
  parent: BaseMobSlaughterDemon
  id: MobLaughterDemon
  name: laughter demon
  description: A large, adorable creature covered in armor with pink bows.
  components:
  - type: Sprite
    sprite: _Goobstation/SlaughterDemon/demon.rsi
    state: bowmon
  - type: MobThresholds
    thresholds:
      0: Alive
      190: Critical
      215: Dead
  - type: SlaughterDevour
    feastSound: /Audio/_Goobstation/Misc/scary_horn2.ogg
  - type: SlaughterDemon
    isLaughter: true
  - type: Speech
    speechVerb: Cluwne
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Items/bikehorn.ogg
    animation: WeaponArcPunch
    damage:
      types:
        Slash: 25
        Structural: 50
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-laughter-demon-name
    description: ghost-role-information-laughter-demon-description
    rules: ghost-role-information-slaughter-demon-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 18000

# midround roll
- type: entity
  parent: BaseMobSlaughterDemon
  id: MobLesserSlaughterDemon
  name: lesser slaughter demon
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      180: Dead
