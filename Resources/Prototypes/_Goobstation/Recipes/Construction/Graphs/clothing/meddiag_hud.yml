              doAfter: 5
            # Orion-Start
            - machinePart: Servo
              name: construction-graph-tag-servo
              icon:
                sprite: "Objects/Misc/stock_parts.rsi"
                state: "micro_mani"
              doAfter: 5
            - machinePart: Servo
              name: construction-graph-tag-servo
              icon:
                sprite: "Objects/Misc/stock_parts.rsi"
                state: "micro_mani"
              doAfter: 5
            # Orion-End
    - node: meddiagHud
