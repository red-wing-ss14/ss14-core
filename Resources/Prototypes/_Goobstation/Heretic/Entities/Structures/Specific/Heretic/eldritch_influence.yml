- type: entity
  id: EldritchInfluence
  name: reality shift
  description: Your eyes start to burn just from a single look. Should you delve deeper?
  placement:
    mode: SnapgridCenter
  components:
  - type: InteractionOutline
  - type: EldritchInfluence
    possibleExamineEffects:
    # Ash
    - - !type:Flammable
        multiplier: 5
        multiplierOnExisting: 5
      - !type:Ignite
    # Rust
    - - !type:Vomit
        thirstAmount: -50
        hungerAmount: -50
      - !type:GenericStatusEffect
        key: KnockedDown
        component: KnockedDown
        time: 20
        type: Add
      - !type:HealthChange
        damage:
          types:
            Ion: 40
    # Void
    - - !type:VoidCurse
        stacks: 5
    # Blade
    - - !type:HealthChange
        damage:
          types:
            Slash: 30
    # Moon
    - - !type:GenericStatusEffect
        key: Pacified
        component: Pacified
        time: 60
        type: Add
    # Cosmos
    - - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 20
        type: Add
    # Flesh
    - - !type:SpillBlood
        amount: 100
    # Lock
    - - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        time: 20
        type: Add
      - !type:RemoveAccess
  - type: Sprite
    sprite: _Goobstation/Heretic/reality_fracture.rsi
    state: icon
  - type: Clickable
  - type: Visibility
    layer: 32 # keep in sync with VisibilityFlags.EldritchInfluence for upstream merges

- type: entity
  id: EldritchInfluenceIntermediate
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 600
  - type: SpawnOnDespawn
    prototype: EldritchInfluenceSpent

- type: entity
  parent: EldritchInfluence
  id: EldritchInfluenceSpent
  name: reality fracture
  description: A reality fracture. Something keeps leaking out of it, should you really be near this thing?
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/reality_fracture.rsi
    state: icon_harvested
  - type: Visibility
    layer: 64 # VisibilityFlags.EldritchInfluence.Spent
  - type: EldritchInfluence
    spent: true
