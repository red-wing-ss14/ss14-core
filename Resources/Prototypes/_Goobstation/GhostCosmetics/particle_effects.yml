
- type: particleEffect
  id: GhostParticlesSparkles
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: cross
  shader: unshaded
  colorOverLifetime:
    - time: 0.0
      color: "#FFFFFFFF"
    - time: 0.5
      color: "#FFE9A0FF"
    - time: 1.0
      color: "#FFE9A000"
  alphaOverLifetime:
    - time: 0.0
      value: 0.0
    - time: 0.2
      value: 1.0
    - time: 1.0
      value: 0.0
  lifetime: 1.2
  lifetimeVariance: 0.4
  speed: 0.3
  speedVariance: 0.2
  particleSize: 0.3
  sizeVariance: 0.1
  emissionRate: 5
  maxCount: 10
  gravity: -0.2
  noiseStrength: 0.1
  noiseFrequency: 0.8
  startRotationVariance: 180
  rotationSpeedVariance: 60
  shape:
    type: CircleFill
    radius: 0.3

