- type: entity
  name: advanced combat medipen
  parent: ChemicalMedipen
  id: AdvancedCombatMedipen
  description: A single-use advanced medipen containing chemicals extracted from eldritch beasts. # ethically sourced space dragon blood
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: advcombatpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: advcombatpen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 40
        reagents:
        - ReagentId: Ichor
          Quantity: 30 # Orion-Edit: 35 > 30
        - ReagentId: Ephedrine # Orion-Edit: TranexamicAcid > Ephedrine
          Quantity: 10 # Orion-Edit: 5 > 10
  - type: Hypospray
    solutionName: pen
    transferAmount: 40
    onlyAffectsMobs: false
    injectOnly: true
  - type: StaticPrice
    price: 500
  - type: Tag
    tags:
    - Medipen

- type: entity
  name: tactical medical kit
  description: Contains everything you need to get a person back up quickly.
  parent: Medkit
  id: MedkitBSO
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    state: bsokit
  - type: Item
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: bsokit
    size: Normal
  - type: Storage
    defaultStorageOrientation: Vertical

- type: entity
  name: tactical repairing kit
  description: Contains everything you need to get a silicon back up quickly.
  parent: MedkitBSO
  id: MedkitBSOIPC
  components:
  - type: Sprite
    state: bsokit-ipc
  - type: Item
    heldPrefix: bsokit-ipc

