- type: entity
  parent: DrinkBase
  id: DrinkBasePlastic
  abstract: true
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100

- type: entity
  parent: DrinkBasePlastic
  id: DrinkFitnessShakerBlack
  name: fitness shaker
  description: Big enough to contain enough protein to get perfectly swole. Don't mind the bits.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Consumable/Drinks/shakerblack.rsi
    state: icon

- type: entity
  parent: DrinkFitnessShakerBlack
  id: DrinkFitnessShakerRed
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Consumable/Drinks/shakerred.rsi
    state: icon

- type: entity
  parent: DrinkFitnessShakerBlack
  id: DrinkFitnessShakerBlue
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Consumable/Drinks/shakerblue.rsi
    state: icon

- type: reagent
  id: MilkChoco
  name: reagent-name-milk-choco
  group: NonAlcoholicDrinks #- Goob: Drinks guidebook split
  desc: reagent-desc-milk-choco
  physicalDesc: reagent-physical-desc-opaque
  flavor: chocolate
  color: "#a67350"  # Reserve: Orchid's Barmania - Vendichaos
  recognizable: true
  plantMetabolism:
    - !type:PlantAdjustNutrition
      amount: 0.1
    - !type:PlantAdjustWater
      amount: 0.9
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 4

- type: entity
  parent: [DrinkVisualsAllFilled, DrinkBottlePlasticSmallBaseFull]
  id: DrinkMilkBottleFull
  name: milk bottle
  description: How do plasmamen even drink this?
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Milk
          Quantity: 30
  - type: Sprite
    sprite: Objects/Consumable/Drinks/waterbottle.rsi
  - type: SolutionContainerVisuals
    inHandsMaxFillLevels: 2
    inHandsFillBaseName: -fill-
  - type: Label
    currentLabel: reagent-name-milk
  - type: Sealable
  - type: Tag # Goobstation
    tags:
    - DrinkBottle
