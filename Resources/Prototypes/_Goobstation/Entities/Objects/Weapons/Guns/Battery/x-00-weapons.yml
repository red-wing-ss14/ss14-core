# I don't want to clutter battery guns with these ones.

- type: entity
  name: X-8 "Station Sweeper"
  parent: [BaseWeaponBattery, BaseGunWieldable, BaseCommandContraband]
  id: WeaponHeadOfSecurityRifle
  description: An elaborately designed rifle, firing shots of pure phoron. Low fire rate, high damage.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/rifle.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    shape:
    - 0,0,4,2
  - type: Gun
    fireRate: 2.5 # Amour edit: 2 > 2.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_perforator.ogg
    defaultDirection: 1, 0
  - type: HitscanBatteryAmmoProvider
    proto: RedMediumLaser # Amour edit: RedMediumSplitLaser > RedMediumLaser
    fireCost: 100 # Amour edit: 80 > 100
  - type: StaticPrice
    price: 2500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Battery
    maxCharge: 3000 # Amour edit: missing > 3000
    startingCharge: 3000 # Amour edit: missing > 3000
  - type: Appearance

- type: entity
  name: X-6 "Threadripper"
  parent: [BaseWeaponBattery, BaseCommandContraband]
  id: WeaponHeadOfSecuritySMG
  description: An elaborately designed SMG, firing shots of pure phoron. Amazing for laying down suppressive fire.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/smg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/smg.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    shape:
    - 0,0,3,1
  - type: Gun
    minAngle: 3
    maxAngle: 18
    fireRate: 9 # Amour edit: 6 > 9
    burstFireRate: 8
    angleIncrease: 4
    angleDecay: 8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    - Burst
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_svalinn.ogg
    defaultDirection: 1, 0
  - type: BatteryAmmoProvider
    proto: BulletLaserHeavy
    fireCost: 30 # Amour edit: 33 > 30
  - type: StaticPrice
    price: 2500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Battery
    maxCharge: 3000 # Amour edit: missing > 3000
    startingCharge: 3000 # Amour edit: missing > 3000
  - type: Appearance

- type: entity
  name: X-12 "Flamberge"
  parent: [BaseWeaponBattery, BaseGunWieldable, BaseCommandContraband]
  id: WeaponHeadOfSecurityShotgun
  description: An elaborately designed shotgun, firing shots of pure phoron. Built to break down defenses, and it does that job well.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/shotgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Appearance
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/shotgun.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/shotgun.rsi
    shape:
    - 0,0,4,1
  - type: Gun
    fireRate: 1.5 # Amour edit: 0.75 > 1.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: BatteryAmmoProvider
    proto: BulletLaserSpreadHeavy
    fireCost: 180 # Amour edit: 125 > 180
  - type: StaticPrice
    price: 2500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true

  - type: Battery
    maxCharge: 3600 # Amour edit: missing > 3600
    startingCharge: 3600 # Amour edit: missing > 3600
- type: entity
  name: X-18 "Ranought"
  parent: [BaseWeaponBattery, BaseGunWieldable, BaseCommandContraband]
  id: WeaponHeadOfSecuritySniper
  description: An elaborately designed sniper rifle, firing shots of pure phoron. You won't want to get hit by this.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/sniper_icon_48x.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Appearance
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/sniper.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/HeadOfSecurity/sniper.rsi
    shape:
    - 0,0,6,1
    storedRotation: 45
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
    fireRate: 0.9 # Amour edit: 0.75 > 0.9
  - type: GunRequiresWield
  - type: BatteryAmmoProvider
    proto: LaserSniper
    fireCost: 250 # Amour edit: 100 > 250
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 8
    pvsIncrease: 0.8
  - type: StaticPrice
    price: 2500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Battery
    maxCharge: 4000 # Amour edit: missing > 4000
    startingCharge: 4000 # Amour edit: missing > 4000
