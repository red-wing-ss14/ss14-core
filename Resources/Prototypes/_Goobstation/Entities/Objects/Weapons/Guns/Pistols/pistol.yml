- type: entity
  name: Dualetta
  parent: [BaseWeaponPistol, BaseSyndicateContraband]
  id: WeaponPistolDualetta
  description: The coolest pistol in the sector. It is said that nobody is strong enough of will to tarnish this weapon's reputation by daring to fire it without its paired pistol. Feeds from .35 Auto pistol magazines.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/Dualetta.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/Dualetta.rsi
  - type: Gun
    minAngle: 1
    maxAngle: 5
    angleIncrease: 1
    angleDecay: 4
    fireRate: 6
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/Pistols/beretta_shot.ogg # Orion-Edit: New sounds
  - type: ItemSlots
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Localization
        startingItem: MagazinePistolHighCapacity
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
            - MagazinePistolHighCapacity
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
#        name: Chamber # Orion-Edit: Localization
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: Tag
    tags:
    - WeaponPistolDualetta
  - type: Multishot
    missChance: 0
    spreadMultiplier: 1
    spreadAddition: 0
  - type: RequiresDualWield
    whitelist:
      tags:
      - WeaponPistolDualetta

- type: entity
  parent: [ BaseItem, BaseSyndicateContraband ]
  id: WeaponPistolAnaconda
  name: Anaconda
  description: A bulky hand cannon with a built in fabricator in its grip. Slowly prints ammo for itself, though don't count on it being fast enough for sustained firefights.
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Tag
    tags:
    - Sidearm
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/anaconda.rsi
    layers:
    - state: icon
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/anaconda.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    fireRate: 3
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/hpistol.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletCaselessRifle
    capacity: 7
    count: 7
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 4
    rechargeSound:
      path: /Audio/Weapons/Guns/Cock/shotgun_close.ogg
  - type: RestrictGunshotsByUserTag # Goobstation
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
  - type: AmmoCounter
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container

- type: entity
  name: Contract Terminator
  parent: [BaseWeaponPistol, BaseCentcommContraband]
  id: WeaponPistolCentcommAgent
  description: Necessity is the mother of deception.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/agentpistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/agentpistol.rsi
  - type: Gun
    minAngle: 1
    maxAngle: 5
    angleIncrease: 1
    angleDecay: 4
    fireRate: 4
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/silenced.ogg
      params:
        volume: -14
  - type: ItemSlots
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Localization
        startingItem: MagazinePistolNeurotoxin
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineMagnum
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
#        name: Chamber # Orion-Edit: Localization
        startingItem: CartridgeMagnumNeurotoxin
        priority: 1
        whitelist:
          tags:
          - CartridgeMagnum
