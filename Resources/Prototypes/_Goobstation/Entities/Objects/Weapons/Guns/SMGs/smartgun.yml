# SPDX-License-Identifier: AGPL-3.0-or-later

- type: entity
  name: Abielle
  parent: [BaseWeaponSubMachineGun, BaseSecurityContraband]
  id: WeaponSubMachineSmart
  description: An experimental weapons platform that fires gyrojets—miniature rockets that communicate with the onboard targeting system to self-correct their flight paths. While sporting minimal recoil, the Abielle is prone to ridiculously wide spread when not homing due to the non-existent barrel. Feeds from .160 Smart magazines.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/SMGs/smartgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-unshaded
      map: ["enum.GunVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - state: mag-unshaded-0
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/SMGs/smartgun.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
      suitstorage:
      - state: equipped-BACKPACK
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -38
    maxAngle: -32
  - type: Gun
    projectileSpeed: 15
    minAngle: 42
    maxAngle: 64
    fireRate: 10
    burstFireRate: 40
    shotsPerBurst: 5
    burstCooldown: 0.5
    lockOnTargetBurst: true
    cameraRecoilScalar: 0
    selectedMode: Burst
    soundGunshot:
      path: /Audio/_Goobstation/Weapons/Guns/Gunshots/smartgun_shoot.ogg
    availableModes:
    - FullAuto
    - Burst
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Localization
        startingItem: MagazineSmart
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineSmart
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
#        name: Chamber # Orion-Edit: Localization
        startingItem: CartridgeSmart
        priority: 1
        whitelist:
          tags:
            - CartridgeSmart
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: true
    zeroNoAmmo: true
  - type: Appearance
  - type: SmartGun
    requiresWield: true
  - type: LaserPointer
  - type: StaticPrice
    price: 1000
  - type: Item
    shape:
    - 0,0,2,1
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 1.5
    pvsIncrease: 0.15
  - type: RestrictGunshotsByUserTag
    doesntContain:
    - Oni
    messages:
    - oni-cannot-shoot-guns-1
    - oni-cannot-shoot-guns-2
    - oni-cannot-shoot-guns-3
