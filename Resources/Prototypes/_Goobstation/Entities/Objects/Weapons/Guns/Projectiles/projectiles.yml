- type: entity
  id: BulletMic
  name: MIC bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Not too bad, but you still don't want to get hit by it.
  components:
  - type: Sprite
    noRot: false
    sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/cbbolt.rsi
    layers:
    - state: cbbolt
  - type: Projectile
    damage:
      types:
        Shock: 10
  - type: StaminaDamageOnCollide
    damage: 30
  - type: KnockdownOnCollide
    dropItems: true
  - type: BlurOnCollide
  - type: TimedDespawn
    lifetime: 0.6 # Orion-Edit: 0.4 > 0.6
  - type: Ammo
    muzzleFlash: null
  - type: Reflective
    reflective:
    - Energy
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.05,-0.05,0.05,0.05"
        hard: false
        mask:
        - Opaque

- type: entity
  id: BulletPlasmaCutter
  name: cutter bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Not too bad, but you still don't want to get hit by it.
  components:
  - type: Reflective
    reflective:
      - NonEnergy
  - type: Sprite
    noRot: false
    sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/bullet_cutter.rsi
    layers:
    - state: icon
      shader: unshaded
  - type: GatheringProjectile
    amount: 40
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 5
  - type: StaminaDamageOnCollide
    damage: 20
  - type: TimedDespawn
    lifetime: 0.2
  - type: PointLight
    radius: 2
    color: purple
    energy: 1

- type: entity
  id: BulletPlasmaCutterStrong
  parent: BulletPlasmaCutter
  components:
  - type: GatheringProjectile
  - type: Projectile
    damage:
      types:
        Heat: 18
        Structural: 100
  - type: TimedDespawn
    lifetime: 0.4
  - type: PointLight
    radius: 4
    color: purple
    energy: 2

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: BulletHighCaliber
  name: bullet (.50 anti-materiel)
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 45 # Orion-Edit: 35 > 45
        Structural: 30 # Amour edit: 40 > 30; Orion
      armorPenetration: 0.4 # Amour edit: 0.5 > 0.4
    penetrationThreshold: 50

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletHighCaliberExplosive
  name: bullet (.50 high-explosive incendiary)
  components:
  - type: Projectile
    damage:
      types:
        Heat: 5 # Orion-Edit: 1 > 5
        Blunt: 2
        Piercing: 7 # Orion-Edit: 3 > 7
        Structural: 20 # Orion
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBombWeak # 1.3 firestacks
    totalIntensity: 15.8 # 3x3 explosion / Orion-Edit: 10.8 > 15.8
    intensitySlope: 1.4 # 14 damage at the center tile
    maxIntensity: 6.4 # 8 damage at the edges / Orion-Edit: 2.4 > 6.4
    maxTileBreak: 0 # 4 damage at the corners
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: bullet
      shader: unshaded

- type: entity
  parent: BasicHitscan
  id: HeavyPulse
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 50
        Blunt: 10
        Structural: 80
        Ion: 20
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_blue
    travelFlash:
      sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/heavy_pulse.rsi
      state: beam_blue_heavy
    impactFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_blue

