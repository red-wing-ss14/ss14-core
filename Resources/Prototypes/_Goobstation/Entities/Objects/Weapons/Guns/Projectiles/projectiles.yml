- type: entity
  id: BulletTemperatureCold
  name: cold temperature bolt
  parent: BulletLaser
  categories: [ HideSpawnMenu ]
  description: Chilling!
  components:
  - type: Projectile
    damage:
      types:
        Cold: 3
  - type: PointLight
    radius: 2
    color: blue
    energy: 1
  - type: ChangeTemperatureOnCollide
    heat: -35000
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
      shader: unshaded

- type: entity
  id: BulletTemperatureHot
  name: hot temperature bolt
  parent: BulletLaser
  categories: [ HideSpawnMenu ]
  description: Burning!
  components:
  - type: Projectile
    damage:
      types:
        Heat: 3
  - type: PointLight
    radius: 2
    color: red
    energy: 1
  - type: ChangeTemperatureOnCollide # This will probably be tweaked.
    heat: 35000


- type: entity
  name: disabler bolt
  id: BulletEnergyGunDisabler
  parent: BulletDisabler
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/energy_bolt.rsi
    layers:
    - state: bolt_blue_heavy
      shader: unshaded
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.3,0.15,0.3"
        hard: false
        mask:
        - Opaque
      fly-by:
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: False
  - type: Ammo
  - type: StaminaDamageOnCollide
    damage: 36 # Amour edit: 33 > 36
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Ion: 20
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  name: disabler bolt
  id: BulletSyndicateDisabler
  parent: BulletDisabler
  categories: [ HideSpawnMenu ]
  components:
  - type: StaminaDamageOnCollide
    damage: 24 # Amour edit: 27 > 24
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Ion: 5
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  id: BulletGrenadeTeargas
  name: tear gas grenade
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
  - type: SmokeOnTrigger
    duration: 10
    smokePrototype: Smoke
    solution:
      reagents:
      - ReagentId: TearGas
        Quantity: 20
    spreadAmount: 5
  - type: TimerTrigger
    delay: 5
  - type: DeleteOnTrigger
  - type: Projectile
    damage:
      types:
        Blunt: 1

- type: entity
  id: HolyBulletCharge
  name: holy bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Marks a target for additional holy damage.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: magicm_yellow
      shader: unshaded
  - type: GatheringProjectile
  - type: DamageMarkerOnCollide
    whitelist:
      components:
      - MobState
    damage:
      types:
        Burn: 3
        Holy: 20
    effect: { sprite: /Textures/_ShitChap/Effects/holy_beam.rsi, state: beam }
    sound: /Audio/Effects/holy.ogg
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Blunt: 0
  # Short lifespan
  - type: TimedDespawn
    lifetime: 0.4

