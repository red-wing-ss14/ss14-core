- type: entity
  name: Chester
  parent: [ BaseWeaponRifle, BaseGunWieldable, BaseCentcommContraband ]
  id: WeaponLeverChester
  description: "A flashy lever-action shotgun designed for NanoTrasen's Blueshield corps. Spinning it to reload fills you with a primal happiness. Feeds from lever rifle magazines."
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Lever/chester_icon_48x.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Lever/chester.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
#        name: Magazine # Orion-Edit: Localization
        startingItem: MagazineShotgunLeverRifle
        insertSound: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineShotgunLeverRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
#        name: Chamber # Orion-Edit: Localization
        priority: 1
        whitelist:
          tags:
          - ShellShotgunHeavy
  - type: Gun
    fireRate: 0.75 # Amour edit: 0.65 > 0.75
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/batrifle.ogg
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    autoEject: true
    soundAutoEject:
      path: /Audio/_Goobstation/Weapons/Guns/MagOut/garand_eject.ogg
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
      params:
        volume: -3
    soundBoltClosed:
      path: /Audio/Weapons/Guns/Bolt/lever_bolt_closed.ogg
      params:
        volume: -3
    soundBoltOpened:
      path: /Audio/Weapons/Guns/Bolt/lever_bolt_opened.ogg
      params:
        volume: -3
  - type: GunRequiresWield
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: UseDelay
    delay: 0.1
  - type: UseDelayBlockShoot
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Lever/chester.rsi
    size: Large
    shape:
    - 0,0,4,1
