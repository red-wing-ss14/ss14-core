- type: entity
  parent: MaterialBase
  id: MaterialBSCrystal
  name: bluespace crystal
  suffix: Full
  components:
  - type: Stack
    stackType: BSCrystal
    baseLayer: base
    layerStates:
    - bluespace_crystal
    - bluespace_crystal_2
    - bluespace_crystal_3
  - type: Sprite
    sprite: _Goobstation/Objects/Materials/materials.rsi
    state: bluespace_crystal
    layers:
    - state: bluespace_crystal
      map: ["base"]
  - type: Appearance
  - type: Item
    heldPrefix: bluespace_crystal
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      BSCrystal: 100
  - type: RandomTeleportOnUse
    radius:
      min: 2
      max: 5
  - type: Tag
    tags:
    - Ore
    - Ingot
  # Orion-Start
  - type: Extractable
    grindableSolutionName: bluespace
  - type: SolutionContainerManager
    solutions:
      bluespace:
        reagents:
        - ReagentId: Bluespace
          Quantity: 20
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: desecration
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 0.1
    damage:
      types:
        Blunt: 1
  # Orion-End

- type: entity
  parent: MaterialBSCrystal
  id: MaterialBSCrystal1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: MaterialBSCrystal
  id: MaterialBSCrystalUnprocessed
  name: unprocessed bluespace crystal
  suffix: Full
  components:
  - type: Stack
    stackType: BSCrystalUnprocessed
  - type: UnclaimedOre
    miningPoints: 250
  # Orion-Start
  - type: Extractable
    grindableSolutionName: bluespace
  - type: SolutionContainerManager
    solutions:
      bluespace:
        reagents:
        - ReagentId: Bluespace
          Quantity: 5
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: desecration
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 0.1
    damage:
      types:
        Blunt: 1
  # Orion-End

- type: entity
  parent: MaterialBSCrystalUnprocessed
  id: MaterialBSCrystal1Unprocessed
  name: unprocessed bluespace crystal
  suffix: Single
  components:
  - type: Stack
    count: 1