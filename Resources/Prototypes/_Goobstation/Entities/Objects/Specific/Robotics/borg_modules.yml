- type: entity
  id: BorgModuleSyndicateWeaponAdvanced
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseSyndicateContraband ]
  name: advanced weapon cyborg module
  components:
  - type: Sprite
    layers:
    - state: syndicate
    - state: icon-syndicate
  - type: ItemBorgModule
    hands:
    - item: WeaponPistolAnaconda
    - item: EnergySword
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: syndicate-weapon-module }

- type: entity
  id: BorgModuleLollypop
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: lollypop cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-lollypop
      sprite: _Goobstation/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: LauncherLollypopRegenerating
    - item: LauncherLollypopRegeneratingTricordazine
    - item: LauncherLollypopRegeneratingMystery # I <3 GAMBLING
  - type: BorgModuleIcon
    icon: { sprite: _Goobstation/Actions/actions_borg.rsi, state: lollypop-module }

- type: entity
  id: BorgModulePKA
  parent: [ BaseBorgModuleCargo, BaseProviderBorgModule ]
  name: proto-kinetic cyborg module
  components:
  - type: Sprite
    layers:
    - state: cargo
    - state: icon-pka
      sprite: _Goobstation/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: HandheldHealthAnalyzer
    - item: WeaponProtoKineticAccelerator
      hand:
        emptyLabel: borg-slot-WeaponProtoKineticAccelerator-empty-goob
        emptyRepresentative: WeaponProtoKineticAccelerator
        whitelist:
          components:
          - PressureDamageChange
  - type: BorgModuleIcon
    icon: { sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi, state: icon }

# Shitmed Modules

- type: entity
  id: BorgModuleSurgery
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: surgery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-surgery
  - type: ItemBorgModule
    hands:
    - item: Scalpel
    - item: SawElectric
    - item: Drill
    - item: Retractor
    - item: Hemostat
    - item: Cautery
    - item: MedicalStitches
    - item: BoneGel
    - item: Bonesetter
    - item: OrganHumanBrain
      hand:
        emptyLabel: borg-slot-organs-empty-goob
        emptyRepresentative: OrganHumanBrain
        whitelist:
          components:
          - BodyPart
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: surgery-module }

- type: entity
  id: BorgModuleAdvancedSurgery
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: advanced surgery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-advanced-surgery
  - type: ItemBorgModule
    hands:
    - item: EnergyScalpel
    - item: EnergyCautery
    - item: AdvancedRetractor
    - item: AdvancedBoneGel
    - item: OrganHumanBrain
      hand:
        emptyLabel: borg-slot-organs-empty-goob
        emptyRepresentative: OrganHumanBrain
        whitelist:
          components:
          - BodyPart
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: adv-surgery-module }
