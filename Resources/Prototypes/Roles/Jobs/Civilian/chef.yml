- type: job
  id: Chef
  name: job-name-chef
  description: job-description-chef
  playTimeTracker: JobChef
  requirements:
    - !type:AnyOfRequirement # Amour edit - Discord OR playtime
      requirements:
        - !type:DiscordLinkRequirement
        - !type:OverallPlaytimeRequirement
          time: 3600 # 1 hr
  startingGear: ChefGear
  icon: "JobIconChef"
  supervisors: job-supervisors-hop
  guides: # goobstation
#  - Chef # Orion-Edit: Removed because dont have this SOP
  - FoodRecipes
  - CQC
  goobcoins: 15 #Goob content
  # Orion-Start
  salary: 55
  payrollDepartmentAccount: Service
  # Orion-End
  access:
  - Service
  - Maintenance
  - Kitchen
  extendedAccess:
  - Hydroponics
  - Bar
  special: # Goobstation - Martial Arts
  - !type:AddComponentSpecial
    components:
      - type: GrantCqc
        startingStage: Hard
        isBlocked: true
  - !type:AddImplantSpecial # Chefs speak space italian
    implants: [ SpaceItalianTranslatorImplant ]

- type: startingGear
  id: ChefGear
  equipment:
    shoes: ClothingShoesChef
    id: ChefPDA
    ears: ClothingHeadsetService
    belt: ClothingBeltChefFilled
  #storage:
    #back:
    #- Stuff

- type: chameleonOutfit
  id: ChefChameleonOutfit
  job: Chef
  equipment:
    head: ClothingHeadHatChef
    eyes: ClothingEyesGlassesCheapSunglasses
    mask: ClothingMaskItalianMoustache
    neck: ClothingNeckScarfStripedBrown
    outerClothing: ClothingOuterJacketChef
    gloves: ClothingHandsGlovesColorWhite
    shoes: ClothingShoesChef
