# No idea why it's in sci but we ball.
# Why is this one file?
- type: job
  id: StationAi
  name: job-name-station-ai
  description: job-description-station-ai
  playTimeTracker: JobStationAi
  requirements:
    - !type:AnyOfRequirement # Amour edit - Discord OR playtime
      requirements:
        - !type:AllOfRequirement # Discord + 1hr silicon minimum
          requirements:
            - !type:DiscordLinkRequirement
            - !type:DepartmentTimeRequirement
              department: Silicon
              time: 3600 # 1 hr
        - !type:DepartmentTimeRequirement # Without Discord - 5hrs silicon
          department: Silicon
          time: 18000 # 5 hrs
  canBeAntag: false
  goobcoins: 40 #Goob content
  icon: JobIconStationAi
  supervisors: job-supervisors-rd
  jobEntity: StationAiBrain
  jobPreviewEntity: PlayerStationAiPreview
  applyTraits: false

- type: job
  id: Borg
  name: job-name-borg
  description: job-description-borg
  playTimeTracker: JobBorg
  requirements:
    - !type:AnyOfRequirement # Amour edit - Discord OR playtime
      requirements:
        - !type:DiscordLinkRequirement
        - !type:OverallPlaytimeRequirement
          time: 10800 # 3 hrs
  canBeAntag: false
  goobcoins: 20 #Goob content
  icon: JobIconBorg
  supervisors: job-supervisors-rd
  jobEntity: PlayerBorgBattery
  applyTraits: true
