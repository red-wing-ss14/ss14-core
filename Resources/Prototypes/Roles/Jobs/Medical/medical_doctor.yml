- type: job
  id: MedicalDoctor
  name: job-name-doctor
  description: job-description-doctor
  playTimeTracker: JobMedicalDoctor
  requirements:
    - !type:AnyOfRequirement # Amour edit - Discord OR playtime
      requirements:
        - !type:DiscordLinkRequirement
        - !type:OverallPlaytimeRequirement
          time: 7200 # 2 hrs
  startingGear: DoctorGear
  icon: "JobIconMedicalDoctor"
  supervisors: job-supervisors-cmo
  guides: # goobstation
#  - MedicalDoctor # Orion-Edit: Removed because dont have this SOP
#  - Medical # Orion-Edit: Removed because dont have this SOP
  - Medicine
  goobcoins: 20 #Goob content
  # Orion-Start
  salary: 80
  payrollDepartmentAccount: Medical
  # Orion-End
  access:
  - Medical
  - Maintenance
  extendedAccess:
  - Chemistry
  special:
  - !type:GiveItemOnHolidaySpecial
    holiday: DoctorDay
    prototype: WehMedipen
  # Shitmed change
  - !type:AddComponentSpecial
    components:
    - type: SurgerySpeedModifier
      speedModifier: 1.5


- type: startingGear
  id: DoctorGear
  equipment:
    ears: ClothingHeadsetMedical
    belt: ClothingBeltMedicalFilled
  #storage:
    #back:
    #- Stuff

- type: chameleonOutfit
  id: MedicalDoctorChameleonOutfit
  job: MedicalDoctor
  equipment:
    head: ClothingHeadNurseHat
    eyes: ClothingEyesHudMedical
    mask: ClothingMaskSterile
    neck: ClothingNeckStethoscope
    outerClothing: ClothingOuterCoatLab
    gloves: ClothingHandsGlovesLatex
