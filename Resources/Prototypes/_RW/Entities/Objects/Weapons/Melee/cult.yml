- type: entity
  name: eldritch longsword
  parent: BaseItem
  id: EldritchLongsword
  description: A sword humming with unholy energy. It glows with a dim red light.
  components:
  - type: Sharp
  - type: Sprite
    sprite: _RW/BloodCult/Entities/Items/Weapons/cult_blade.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.3333
    range: 1.65
    damage:
      types:
        Slash: 24
    heavyStaminaCost: 10
    angle: 90
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 24
  - type: EmbeddableProjectile
  - type: ThrowingAngle
    angle: 225
  - type: Item
    size: Normal
  - type: Clothing
    slots:
    - back
  - type: DisarmMalus
  - type: CultItem
  - type: PointLight
    color: Red
    radius: 2
    softness: 1

- type: entity
  parent: BaseItem
  id: BloodSpear
  name: blood halberd
  description: A sickening spear composed entirely of crystallized blood.
  components:
  - type: Sprite
    sprite: _RW/BloodCult/Entities/Items/Weapons/cult_spear.rsi
    state: icon
  - type: EmbeddableProjectile
    offset: 0.15,0.15
  - type: ThrowingAngle
    angle: 225
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.20,-0.10
          - -0.10,-0.20
          - 0.40,0.30
          - 0.30,0.40
        density: 20
        mask:
        - BulletImpassable
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 26
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    range: 2
    attackRate: 1.42
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 40
  - type: Item
    sprite: _RW/BloodCult/Entities/Items/Weapons/cult_spear.rsi
    storedRotation: 44
    size: Huge
    shape:
    - 0,0,5,0
  - type: Clothing
    slots:
    - back
    - suitStorage
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
  - type: UseDelay
  - type: DisarmMalus
  - type: CultItem
  - type: BloodSpear

- type: entity
  parent: BaseItem
  id: BloodRitesAura
  name: blood rite aura
  description: Absorbs blood from anything you touch. Touching cultists and constructs can heal them. Use in-hand to cast an advanced rite.
  components:
  - type: Sprite
    sprite: _RW/BloodCult/Entities/Items/rites.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 0
    heavyStaminaCost: 0
  - type: BloodRitesAura
  - type: Tag
    tags:
    - BloodRitesAura
  - type: UserInterface
    interfaces:
      enum.BloodRitesUiKey.Key:
        type: BloodRitesUi
  - type: ActivatableUI
    key: enum.BloodRitesUiKey.Key
    inHandsOnly: true
    requireActiveHand: false
