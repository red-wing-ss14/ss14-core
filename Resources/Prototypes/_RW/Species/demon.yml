- type: species
  id: Demon
  name: species-name-demon
  roundStart: false
  prototype: MobDemon
  bodyTypes:
  - DemonNormal
  defaultSkinTone: "#34a223"
  markingLimits: MobDemonMarkingLimits
  dollPrototype: MobDemonDummy
  skinColoration: Hues
  naming: firstlast
  sexes: [Male, Female]
  category: Unusual
  description: "/ServerInfo/_RW/SpeciesDescriptions/Demon.xml"
  minHeight: 0.90
  defaultHeight: 1
  maxHeight: 1.20
  minWidth: 0.90
  defaultWidth: 1
  maxWidth: 1.10
  pros:
  - species-demon-pro-fire-resist
  - species-demon-pro-physical-resist
  - species-demon-pro-cold-resist
  - species-demon-pro-piercing-unarmed
  cons:
  - species-demon-con-holy-vulnerable

- type: bodyType
  id: DemonNormal
  name: body-normal
  sprites:
    Special: MobHumanoidAnyMarking
    Head: MobDemonHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Face: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Chest: MobDemonTorso
    Groin: MobDemonTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Wings: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobDemonLArm
    RArm: MobDemonRArm
    LHand: MobDemonLHand
    RHand: MobDemonRHand
    LLeg: MobDemonLLeg
    RLeg: MobDemonRLeg
    LFoot: MobDemonLFoot
    RFoot: MobDemonRFoot

- type: markingPoints
  id: MobDemonMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    HeadTop:
      points: 1
      required: false
    HeadSide:
      points: 1
      required: false
    Chest:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ DemonTailDefault ]
    Snout:
      points: 1
      required: false
    Legs:
      points: 2
      required: false
    Arms:
      points: 2
      required: false
    Wings:
      points: 1
      required: false

