# region Audio

- type: loadout
  id: VinylSleeve
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobMusician
      time: 18000 # 5hr
  storage:
    back:
    - VinylSleeveBlack
  groupBy: "audio"

- type: loadout
  id: DiskCaseFilled
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobJanitor
      time: 18000 # 5hr
  storage:
    back:
    - DiskCaseFilled
  groupBy: "audio"

- type: entity
  parent: DiskCase
  id: DiskCaseGold
  name: golden disk case
  suffix: Loadout, Trinkets
  components:
  - type: Sprite
    state: icon_base
    color: "#ffc833"
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CdDiskCargonia
        - id: CargoDocument
  - type: Storage
    grid:
    - 0,0,0,2

- type: loadout
  id: DiskCaseGold
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobMusician
      time: 180000 # 50hr
  storage:
    back:
    - DiskCaseGold
  groupBy: "audio"

# endregion

# region Rings

- type: entity
  parent: SilverRing
  id: MetalRing
  name: metal ring
  description: A light decorative ring made from several different metals.
  suffix: Loadout, Trinkets
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#687888"
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Silver: 50

- type: loadout
  id: MetalRing
  storage:
    back:
    - MetalRing
  groupBy: "rings"

- type: entity
  parent: SilverRing
  id: PlasticRing
  name: plastic ring
  description: A light decorative ring made from plastic.
  suffix: Loadout, Trinkets
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#ff7888"
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100

- type: loadout
  id: PlasticRing
  storage:
    back:
    - PlasticRing
  groupBy: "rings"

- type: entity
  parent: PlasticRing
  id: FakeDiamondRing
  name: fake diamond ring
  description: A simple ring with a fake, yet beautiful gem in it.
  components:
  - type: Sprite
    layers:
      - state: ring
      - state: gem
        color: "#c1ffff"

- type: loadout
  id: FakeDiamondRing
  storage:
    back:
    - FakeDiamondRing
  groupBy: "rings"

- type: entity
  parent: FakeDiamondRing
  id: FakeRubyRing
  name: fake ruby ring
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#687888"
      - state: gem
        color: "#aa3333"

- type: loadout
  id: FakeRubyRing
  storage:
    back:
    - FakeRubyRing
  groupBy: "rings"

